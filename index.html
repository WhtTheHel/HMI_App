<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>HMI Super App - Final & Fixed</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        :root { --hmi-green: #0b6623; --hmi-gold: #f1c40f; --bg-dark: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; overflow-x: hidden; }

        /* --- AUTH SCREEN --- */
        .auth-page { background: linear-gradient(135deg, var(--hmi-green) 0%, #000 100%); min-height: 100vh; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .auth-card { width: 100%; max-width: 400px; background: white; border-radius: 25px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); text-align: center; }
        input { width: 100%; padding: 12px 15px; margin: 8px 0; border-radius: 12px; border: 1px solid #ddd; outline: none; font-size: 14px; }
        button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main { background: var(--hmi-green); color: white; }
        .btn-google { background: white; border: 1px solid #dadce0; display: flex; align-items: center; justify-content: center; gap: 10px; color: #444; }

        /* --- APP STRUCTURE --- */
        #app { display: none; }
        .topbar { background: var(--hmi-green); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .user-avatar-top { width: 38px; height: 38px; border-radius: 50%; border: 2px solid white; object-fit: cover; cursor: pointer; background: #eee; }

        /* --- SIDEBAR --- */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: var(--bg-dark); transition: 0.3s; z-index: 200; padding: 25px; color: white; }
        .sidebar.active { left: 0; }
        .role-badge-sidebar { background: var(--hmi-gold); color: black; padding: 3px 10px; border-radius: 5px; font-size: 11px; font-weight: bold; display: inline-block; margin-top: 10px; text-transform: uppercase; }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 400px; border-radius: 20px; padding: 25px; text-align: center; }
        .modal input { text-align: left; }

        /* --- CHAT SYSTEM --- */
        #chatView { display: none; flex-direction: column; height: calc(100vh - 58px); background: #e5ddd5; position: fixed; inset: 58px 0 0 0; z-index: 50; }
        #messagesContainer { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 14px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg-me { align-self: flex-end; background: #dcf8c6; border-top-right-radius: 2px; }
        .msg-them { align-self: flex-start; background: white; border-top-left-radius: 2px; }
        .sender-name { font-size: 10px; font-weight: bold; color: var(--hmi-green); display: block; margin-bottom: 2px; }
        .chat-input-area { background: white; padding: 10px; display: flex; gap: 10px; border-top: 1px solid #ddd; }

        .overlay { position: fixed; display: none; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="window.closeAll()"></div>

<div id="loginScreen" class="auth-page">
    <div class="auth-card">
        <img src="pngtree-hmi-organization-shield-logo-png-image_7307707.png" style="width:70px; margin-bottom:10px;">
        <h2 id="authTitle" style="margin:0; color:var(--hmi-green);">MASUK KADER</h2>
        <input type="text" id="regNama" placeholder="Nama Lengkap (Khusus Daftar)" style="display:none;">
        <input type="text" id="identifier" placeholder="Email atau Nama Lengkap">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-main" onclick="window.handleAuth()">MASUK SEKARANG</button>
        <div style="margin:10px 0; font-size:12px; color:#888;">ATAU</div>
        <button class="btn-google" onclick="window.loginGoogle()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="18"> Masuk via Google
        </button>
        <button onclick="window.toggleAuth()" style="background:none; color:var(--hmi-green); font-size:13px; text-decoration:underline; margin-top:10px;">Belum punya akun? Daftar</button>
    </div>
</div>

<div id="app">
    <div class="topbar">
        <div onclick="window.toggleSidebar()" style="cursor:pointer; font-size:22px;">☰</div>
        <b style="letter-spacing: 1px;">HMI COORDINATION</b>
        <img id="userTopPhoto" src="" class="user-avatar-top" onclick="window.openModal('settingsModal')">
    </div>

    <div id="sidebar" class="sidebar">
        <h3 style="color:var(--hmi-gold); margin-bottom:0;">PROFIL KADER</h3>
        <div id="roleBadgeSidebar" class="role-badge-sidebar">MEMUAT...</div>
        <p id="userNameSidebar" style="margin: 10px 0 25px 0; font-size:15px; color:#ddd;"></p>
        
        <button onclick="window.closeAll()" style="background:none; color:white; text-align:left; padding:10px 0; border-bottom:1px solid #333; width:100%;">🏠 Dashboard</button>
        <div id="adminMenu" style="display:none; margin-top:10px;">
            <button onclick="window.openModal('groupModal')" class="btn-main" style="font-size:12px;">➕ Buat Grup Baru</button>
        </div>
        <button onclick="window.logout()" style="margin-top:40px; background:#e74c3c; color:white; width:100%; border-radius:10px;">🚪 Keluar</button>
    </div>

    <div id="groupListView"><div id="groupContainer" style="padding:10px;"></div></div>

    <div id="chatView">
        <div style="background:var(--hmi-green); color:white; padding:10px 15px; display:flex; align-items:center; gap:12px;">
            <img id="chatGroupImg" src="" style="width:38px; height:38px; border-radius:50%; background:white; object-fit:cover;">
            <b id="chatGroupName" style="flex:1; font-size:14px;">Nama Grup</b>
            <button onclick="window.backToGroups()" style="background:rgba(255,255,255,0.2); border:none; color:white; padding:5px 12px; border-radius:8px; font-size:12px;">KEMBALI</button>
        </div>
        <div id="messagesContainer"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Tulis pesan..." style="flex:1; border-radius:20px; margin:0;">
            <button class="btn-main" onclick="window.sendMessage()" style="width:70px; border-radius:20px; margin:0;">Kirim</button>
        </div>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--hmi-green); margin-top:0;">PENGATURAN</h3>
        <p style="font-size:12px; color:gray; text-align:left; margin-bottom:5px;">Nama Lengkap</p>
        <input type="text" id="setNama">
        <p style="font-size:12px; color:gray; text-align:left; margin-bottom:5px;">Tanggal Lahir</p>
        <input type="date" id="setTglLahir">
        <button class="btn-main" onclick="window.saveSettings()" style="margin-top:15px;">SIMPAN</button>
        <button onclick="window.closeAll()" style="background:#eee; color:#333;">BATAL</button>
    </div>
</div>

<div id="groupModal" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--hmi-green); margin-top:0;">GRUP BARU</h3>
        <input type="text" id="newGroupName" placeholder="Nama Grup">
        <input type="text" id="newGroupImg" placeholder="Link Gambar (URL)">
        <button class="btn-main" onclick="window.submitGroup()">BUAT SEKARANG</button>
        <button onclick="window.closeAll()" style="background:#eee; color:#333;">BATAL</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup, updateProfile } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
    import { getFirestore, doc, setDoc, getDoc, getDocs, collection, query, where, onSnapshot, addDoc, deleteDoc, updateDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

    const firebaseConfig = {
        apiKey: "AIzaSyA_SW13O3EPp6L6TGT3UV5B2ADzwCV_Owo",
        authDomain: "hmi-app-ac76d.firebaseapp.com",
        projectId: "hmi-app-ac76d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let isLoginMode = true;
    let currentGroupId = null;
    let chatUnsubscribe = null;
    let userRole = "anggota";

    // --- AUTH LOGIC ---
    window.loginGoogle = async () => {
        try {
            const res = await signInWithPopup(auth, provider);
            const userRef = doc(db, "users", res.user.uid);
            const snap = await getDoc(userRef);
            if (!snap.exists()) {
                await setDoc(userRef, { nama: res.user.displayName, email: res.user.email, role: "anggota", tglLahir: "" });
            }
        } catch (e) { alert("Gagal Google: " + e.message); }
    };

    window.toggleAuth = () => {
        isLoginMode = !isLoginMode;
        document.getElementById('authTitle').innerText = isLoginMode ? "MASUK KADER" : "DAFTAR KADER";
        document.getElementById('regNama').style.display = isLoginMode ? "none" : "block";
    };

    window.handleAuth = async () => {
        const iden = document.getElementById('identifier').value.trim();
        const pass = document.getElementById('password').value;
        const nama = document.getElementById('regNama').value.trim();

        try {
            if (isLoginMode) {
                let email = iden;
                if (!iden.includes('@')) {
                    const q = query(collection(db, "users"), where("nama", "==", iden));
                    const s = await getDocs(q);
                    if (s.empty) return alert("Nama tidak ditemukan!");
                    email = s.docs[0].data().email;
                }
                await signInWithEmailAndPassword(auth, email, pass);
            } else {
                if(!nama) return alert("Isi Nama Lengkap!");
                const res = await createUserWithEmailAndPassword(auth, iden, pass);
                await setDoc(doc(db, "users", res.user.uid), { nama: nama, email: iden, role: "anggota", tglLahir: "" });
                await updateProfile(res.user, { displayName: nama });
            }
        } catch (e) { alert("Error: " + e.message); }
    };

    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('userTopPhoto').src = user.photoURL || `https://ui-avatars.com/api/?name=${user.displayName || 'Kader'}&background=random`;

            onSnapshot(doc(db, "users", user.uid), (snap) => {
                if (snap.exists()) {
                    const d = snap.data();
                    userRole = (d.role || "anggota").toLowerCase().trim();
                    const dispRole = (userRole === "admin_utama" || userRole === "owner") ? "OWNER" : userRole.toUpperCase();
                    
                    document.getElementById('userNameSidebar').innerText = d.nama;
                    document.getElementById('roleBadgeSidebar').innerText = dispRole;
                    document.getElementById('adminMenu').style.display = (dispRole === "OWNER" || userRole === "admin") ? 'block' : 'none';
                    
                    document.getElementById('setNama').value = d.nama;
                    document.getElementById('setTglLahir').value = d.tglLahir || "";
                }
            });
            loadGroups();
        } else {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
        }
    });

    // --- SETTINGS ---
    window.saveSettings = async () => {
        try {
            const user = auth.currentUser;
            const newNama = document.getElementById('setNama').value;
            const newTgl = document.getElementById('setTglLahir').value;
            
            await updateDoc(doc(db, "users", user.uid), { nama: newNama, tglLahir: newTgl });
            await updateProfile(user, { displayName: newNama });
            alert("Berhasil disimpan!");
            window.closeAll();
        } catch (e) { alert(e.message); }
    };

    // --- GROUPS & CHAT LOGIC ---
    function loadGroups() {
        onSnapshot(collection(db, "groups"), (s) => {
            const c = document.getElementById('groupContainer');
            c.innerHTML = "";
            s.forEach(g => {
                const d = g.data();
                const img = d.fotoGrup || "pngtree-hmi-organization-shield-logo-png-image_7307707.png";
                const div = document.createElement('div');
                div.style = "display:flex; align-items:center; background:white; padding:15px; border-bottom:1px solid #eee; cursor:pointer;";
                div.innerHTML = `
                    <img src="${img}" style="width:45px; height:45px; border-radius:50%; margin-right:15px; object-fit:cover;">
                    <div style="flex:1" onclick="window.openChat('${g.id}','${d.namaGrup}','${img}')">
                        <b style="font-size:15px;">${d.namaGrup}</b><br><small style="color:gray;">Ketuk untuk bergabung...</small>
                    </div>
                    ${(userRole === "owner" || userRole === "admin_utama") ? `<button onclick="window.deleteGroup('${g.id}')" style="background:#ff4d4d; color:white; border:none; padding:5px 8px; border-radius:5px; font-size:10px;">HAPUS</button>` : ''}
                `;
                c.appendChild(div);
            });
        });
    }

    window.openChat = (id, name, img) => {
        currentGroupId = id;
        document.getElementById('chatView').style.display = 'flex';
        document.getElementById('chatGroupName').innerText = name;
        document.getElementById('chatGroupImg').src = img;
        
        const container = document.getElementById('messagesContainer');
        if (chatUnsubscribe) chatUnsubscribe();
        
        chatUnsubscribe = onSnapshot(collection(db, "groups", id, "messages"), (snap) => {
            container.innerHTML = "";
            const msgs = snap.docs.sort((a,b) => (a.data().time || 0) - (b.data().time || 0));
            msgs.forEach(m => {
                const d = m.data();
                const isMe = d.senderId === auth.currentUser.uid;
                const div = document.createElement('div');
                div.className = `msg ${isMe ? 'msg-me' : 'msg-them'}`;
                div.innerHTML = `<span class="sender-name">${isMe ? 'Anda' : d.senderName}</span>${d.text}`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        });
    };

    window.sendMessage = async () => {
        const input = document.getElementById('chatInput');
        if(!input.value.trim() || !currentGroupId) return;
        const userName = document.getElementById('userNameSidebar').innerText;
        await addDoc(collection(db, "groups", currentGroupId, "messages"), {
            text: input.value,
            senderId: auth.currentUser.uid,
            senderName: userName,
            time: Date.now()
        });
        input.value = "";
    };

    window.submitGroup = async () => {
        const n = document.getElementById('newGroupName').value;
        const i = document.getElementById('newGroupImg').value;
        if(!n) return;
        await addDoc(collection(db, "groups"), { namaGrup: n, fotoGrup: i });
        window.closeAll();
    };

    window.deleteGroup = async (id) => { if(confirm("Hapus grup ini?")) await deleteDoc(doc(db, "groups", id)); };
    window.backToGroups = () => { document.getElementById('chatView').style.display = 'none'; if(chatUnsubscribe) chatUnsubscribe(); };
    window.toggleSidebar = () => { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); };
    window.openModal = (id) => { document.getElementById(id).style.display = 'flex'; };
    window.closeAll = () => { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); };
</script>
</body>
</html>
