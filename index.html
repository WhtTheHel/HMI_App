<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HMI Connect</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="overlay" onclick="toggleSidebar()"></div>

<!-- LOGIN -->
<div id="authLayer">
  <h2>HMI CONNECT</h2>
  <input id="logEmail" placeholder="Email">
  <input id="logPass" type="password" placeholder="Password">
  <button id="btnSignIn" class="btn-hmi">Login</button>
  <button id="btnGoogle" class="btn-hmi">Login Google</button>
</div>

<!-- APP -->
<div id="appLayer" style="display:none;">
  
  <div class="topbar">
    <div onclick="toggleSidebar()">☰</div>
    <b id="pageTitle">BERANDA</b>
    <div>🔔</div>
  </div>

  <div id="sidebar">
    <div onclick="changeView('homeView','BERANDA')">🏠 Beranda</div>
    <div id="menuAdmin" style="display:none;" onclick="openAdmin()">📊 Dashboard</div>
    <div onclick="toggleDarkMode()">🌙 Dark Mode</div>
    <div onclick="doLogout()">🚪 Logout</div>
  </div>

  <!-- DASHBOARD -->
  <div id="adminView" class="view">
    <h2>Dashboard</h2>
    <div class="grid">
      <div class="card stat"><h3 id="totalUsers">0</h3><p>User</p></div>
      <div class="card stat"><h3 id="totalPosts">0</h3><p>Post</p></div>
      <div class="card stat"><h3 id="totalChats">0</h3><p>Chat</p></div>
    </div>
    <div id="adminUserList"></div>
  </div>

  <!-- BERANDA -->
  <div id="homeView" class="view active">
    <div class="card post-box">
      <textarea id="pInput" placeholder="Apa yang kamu pikirkan?"></textarea>
      <div class="post-actions">
        <input type="file" id="pFile">
        <button id="btnPost" class="btn-hmi">POST</button>
      </div>
    </div>
    <div id="feed"></div>
  </div>

</divu>

<div id="toast"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
