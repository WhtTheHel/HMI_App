<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>HMI Super App - Final Version</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        :root { --hmi-green: #0b6623; --hmi-gold: #f1c40f; --bg-dark: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }

        /* --- AUTH --- */
        .auth-page { background: linear-gradient(135deg, var(--hmi-green) 0%, #000 100%); min-height: 100vh; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .auth-card { width: 100%; max-width: 400px; background: white; border-radius: 25px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); text-align: center; }
        input { width: 100%; padding: 12px 15px; margin: 8px 0; border-radius: 12px; border: 1px solid #ddd; outline: none; }
        button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main { background: var(--hmi-green); color: white; }
        .btn-google { background: white; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* --- APP --- */
        #app { display: none; }
        .topbar { background: var(--hmi-green); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .user-avatar-top { width: 38px; height: 38px; border-radius: 50%; border: 2px solid white; object-fit: cover; cursor: pointer; }

        /* --- SIDEBAR --- */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: var(--bg-dark); transition: 0.3s; z-index: 200; padding: 25px; color: white; }
        .sidebar.active { left: 0; }
        .role-badge-sidebar { background: var(--hmi-gold); color: black; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; display: inline-block; margin-top: 5px; }

        /* --- MODAL SETTINGS --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 400px; border-radius: 20px; padding: 25px; position: relative; }
        .modal h3 { margin-top: 0; color: var(--hmi-green); }
        .label-text { font-size: 12px; color: #666; display: block; text-align: left; margin-top: 10px; }

        /* --- CHAT & LIST --- */
        #chatView { display: none; flex-direction: column; height: calc(100vh - 58px); background: #e5ddd5; }
        #messagesContainer { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 80%; padding: 10px; border-radius: 12px; font-size: 14px; position: relative; }
        .msg-me { align-self: flex-end; background: #dcf8c6; }
        .msg-them { align-self: flex-start; background: white; }
        .overlay { position: fixed; display: none; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<div id="overlay" class="overlay"></div>

<div id="loginScreen" class="auth-page">
    <div class="auth-card">
        <img src="pngtree-hmi-organization-shield-logo-png-image_7307707.png" style="width:70px; margin-bottom:10px;">
        <h2 id="authTitle" style="margin:0; color:var(--hmi-green);">MASUK KADER</h2>
        <input type="text" id="regNama" placeholder="Nama Lengkap" style="display:none;">
        <input type="text" id="identifier" placeholder="Email atau Nama">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-main" onclick="window.handleAuth()">MASUK</button>
        <div style="margin:10px 0; font-size:12px; color:#888;">ATAU</div>
        <button class="btn-google" onclick="window.loginGoogle()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="18"> Google
        </button>
        <button onclick="window.toggleAuth()" style="background:none; color:var(--hmi-green); font-size:13px; text-decoration:underline;">Daftar Akun Baru</button>
    </div>
</div>

<div id="app">
    <div class="topbar">
        <div onclick="window.toggleSidebar()" style="cursor:pointer; font-size:22px;">☰</div>
        <b>HMI COORDINATION</b>
        <img id="userTopPhoto" src="" class="user-avatar-top" onclick="window.openModal('settingsModal')">
    </div>

    <div id="sidebar" class="sidebar">
        <h3 style="color:var(--hmi-gold); margin-bottom:0;">PROFIL</h3>
        <div id="roleBadgeSidebar" class="role-badge-sidebar">ANGGOTA</div>
        <p id="userNameSidebar" style="margin: 10px 0 20px 0; font-size:14px; color:#ddd;"></p>
        
        <button onclick="window.closeAll()" style="background:none; color:white; text-align:left; border-bottom:1px solid #333;">🏠 Dashboard</button>
        <div id="adminMenu" style="display:none; margin-top:10px;">
            <button onclick="window.openModal('groupModal')" class="btn-main" style="font-size:12px;">➕ Buat Grup Baru</button>
        </div>
        <button onclick="window.logout()" style="margin-top:40px; background:#e74c3c; color:white;">🚪 Keluar</button>
    </div>

    <div id="groupListView"><div id="groupContainer" style="padding:10px;"></div></div>

    <div id="chatView">
        <div style="background:var(--hmi-green); color:white; padding:10px; display:flex; align-items:center; gap:10px;">
            <img id="chatGroupImg" src="" style="width:35px; height:35px; border-radius:50%; background:white; object-fit:cover;">
            <b id="chatGroupName" style="flex:1">Grup</b>
            <button onclick="window.backToGroups()" style="background:rgba(255,255,255,0.2); border:none; color:white; padding:5px 10px; border-radius:8px;">TUTUP</button>
        </div>
        <div id="messagesContainer"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Ketik pesan..." style="flex:1; border-radius:20px;">
            <button class="btn-main" onclick="window.sendMessage()" style="width:60px; border-radius:20px;">Kirim</button>
        </div>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>PENGATURAN PROFIL</h3>
        <span class="label-text">Nama Lengkap</span>
        <input type="text" id="setNama" placeholder="Nama Baru">
        
        <span class="label-text">Tanggal Lahir</span>
        <input type="date" id="setTglLahir">
        
        <div id="reauthArea" style="display:none; border-top:1px solid #eee; margin-top:15px; padding-top:10px;">
            <span class="label-text">Ubah Password Baru</span>
            <input type="password" id="setPass" placeholder="Minimal 6 karakter">
        </div>

        <button class="btn-main" onclick="window.saveSettings()" style="margin-top:15px;">SIMPAN PERUBAHAN</button>
        <button onclick="window.closeAll()" style="background:#eee;">BATAL</button>
    </div>
</div>

<div id="groupModal" class="modal">
    <div class="modal-content">
        <h3>BUAT GRUP BARU</h3>
        <input type="text" id="newGroupName" placeholder="Nama Grup">
        <input type="text" id="newGroupImg" placeholder="URL Foto Grup">
        <button class="btn-main" onclick="window.submitGroup()">BUAT SEKARANG</button>
        <button onclick="window.closeAll()" style="background:#eee;">BATAL</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup, updatePassword, updateProfile } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
    import { getFirestore, doc, setDoc, getDoc, getDocs, collection, query, where, onSnapshot, addDoc, deleteDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

    const firebaseConfig = {
        apiKey: "AIzaSyA_SW13O3EPp6L6TGT3UV5B2ADzwCV_Owo",
        authDomain: "hmi-app-ac76d.firebaseapp.com",
        projectId: "hmi-app-ac76d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let isLoginMode = true;
    let userRole = "anggota";

    // --- AUTH FUNCTIONS ---
    window.loginGoogle = async () => {
        try {
            const res = await signInWithPopup(auth, provider);
            const userRef = doc(db, "users", res.user.uid);
            const snap = await getDoc(userRef);
            if (!snap.exists()) {
                await setDoc(userRef, { nama: res.user.displayName, email: res.user.email, role: "anggota", tglLahir: "" });
            }
        } catch (e) { alert(e.message); }
    };

    window.toggleAuth = () => {
        isLoginMode = !isLoginMode;
        document.getElementById('authTitle').innerText = isLoginMode ? "MASUK KADER" : "DAFTAR KADER";
        document.getElementById('regNama').style.display = isLoginMode ? "none" : "block";
    };

    window.handleAuth = async () => {
        const iden = document.getElementById('identifier').value.trim();
        const pass = document.getElementById('password').value;
        const nama = document.getElementById('regNama').value.trim();

        try {
            if (isLoginMode) {
                let email = iden;
                if (!iden.includes('@')) {
                    const q = query(collection(db, "users"), where("nama", "==", iden));
                    const s = await getDocs(q);
                    if (s.empty) return alert("Nama tidak ditemukan!");
                    email = s.docs[0].data().email;
                }
                await signInWithEmailAndPassword(auth, email, pass);
            } else {
                const res = await createUserWithEmailAndPassword(auth, iden, pass);
                await setDoc(doc(db, "users", res.user.uid), { nama: nama, email: iden, role: "anggota", tglLahir: "" });
            }
        } catch (e) { alert(e.message); }
    };

    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('userTopPhoto').src = user.photoURL || `https://ui-avatars.com/api/?name=${user.displayName || 'Kader'}&background=random`;
            
            // Area Re-auth hanya untuk login Email
            document.getElementById('reauthArea').style.display = user.providerData[0].providerId === 'password' ? 'block' : 'none';

            onSnapshot(doc(db, "users", user.uid), (snap) => {
                if (snap.exists()) {
                    const d = snap.data();
                    userRole = (d.role || "anggota").toLowerCase();
                    const dispRole = userRole === "admin_utama" ? "OWNER" : userRole.toUpperCase();
                    
                    document.getElementById('userNameSidebar').innerText = d.nama;
                    document.getElementById('roleBadgeSidebar').innerText = dispRole;
                    document.getElementById('adminMenu').style.display = (userRole === "owner" || userRole === "admin" || userRole === "admin_utama") ? 'block' : 'none';
                    
                    // Isi form settings otomatis
                    document.getElementById('setNama').value = d.nama;
                    document.getElementById('setTglLahir').value = d.tglLahir || "";
                }
            });
            loadGroups();
        } else {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
        }
    });

    // --- SETTINGS LOGIC ---
    window.saveSettings = async () => {
        const user = auth.currentUser;
        const newNama = document.getElementById('setNama').value;
        const newTgl = document.getElementById('setTglLahir').value;
        const newPass = document.getElementById('setPass').value;

        try {
            // Update Firestore
            await updateDoc(doc(db, "users", user.uid), {
                nama: newNama,
                tglLahir: newTgl
            });

            // Update Auth Profile
            await updateProfile(user, { displayName: newNama });

            // Update Password jika diisi
            if (newPass && newPass.length >= 6) {
                await updatePassword(user, newPass);
            }

            alert("Profil Berhasil Diperbarui!");
            window.closeAll();
        } catch (e) { alert("Gagal Simpan: " + e.message); }
    };

    // --- GROUP & CHAT (SAMA DENGAN SEBELUMNYA) ---
    function loadGroups() {
        onSnapshot(collection(db, "groups"), (s) => {
            const c = document.getElementById('groupContainer');
            c.innerHTML = "";
            s.forEach(g => {
                const d = g.data();
                const div = document.createElement('div');
                div.style = "display:flex; align-items:center; background:white; padding:15px; margin-bottom:1px; cursor:pointer;";
                div.innerHTML = `<img src="${d.fotoGrup || 'pngtree-hmi-organization-shield-logo-png-image_7307707.png'}" style="width:40px; height:40px; border-radius:50%; margin-right:15px;">
                                 <div onclick="window.openChat('${g.id}','${d.namaGrup}','${d.fotoGrup}')"><b>${d.namaGrup}</b></div>`;
                c.appendChild(div);
            });
        });
    }

    window.openChat = (id, n, i) => { 
        document.getElementById('groupListView').style.display='none'; 
        document.getElementById('chatView').style.display='flex';
        document.getElementById('chatGroupName').innerText = n;
        document.getElementById('chatGroupImg').src = i || 'pngtree-hmi-organization-shield-logo-png-image_7307707.png';
    };
    window.backToGroups = () => { document.getElementById('groupListView').style.display='block'; document.getElementById('chatView').style.display='none'; };
    window.toggleSidebar = () => { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); };
    window.openModal = (id) => { document.getElementById(id).style.display='flex'; };
    window.closeAll = () => { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); };
</script>
</body>
</html>
