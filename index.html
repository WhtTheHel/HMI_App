<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HMI Connect</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="overlay" onclick="toggleSidebar()"></div>


<div id="authLayer">
  <h2>HMI CONNECT</h2>
  <input id="logEmail" placeholder="Email">
  <input id="logPass" type="password" placeholder="Password">
  <button id="btnSignIn" class="btn-hmi">Login</button>
  <button id="btnGoogle" class="btn-hmi">Login Google</button>
</div>


<div id="appLayer" style="display:none;">
  
  <div class="topbar">
    <div onclick="toggleSidebar()">☰</div>
    <b id="pageTitle">BERANDA</b>
    <div>🔔 <span id="notifBadge">0</span></div>
  </div>

  <div id="sidebar">
    <div onclick="changeView('homeView','BERANDA')">🏠 Beranda</div>
    <div onclick="openAdmin()">📊 Dashboard</div>
    <div onclick="toggleDarkMode()">🌙 Dark Mode</div>
    <div onclick="doLogout()">🚪 Logout</div>
  </div>

  
  <div id="adminView" class="view">
    <h2>Dashboard</h2>
    <div class="grid">
      <div class="card stat"><h3 id="totalUsers">0</h3><p>User</p></div>
      <div class="card stat"><h3 id="totalPosts">0</h3><p>Post</p></div>
      <div class="card stat"><h3 id="totalChats">0</h3><p>Chat</p></div>
    </div>
  </div>

  
  <div id="homeView" class="view active">
    <textarea id="pInput" placeholder="Tulis sesuatu..."></textarea>
    <input type="file" id="pFile">
    <button id="btnPost" class="btn-hmi">POST</button>
    <div id="feed"></div>
  </div>


  <div id="chatView" class="view">
    <div id="chatBox"></div>
    <input id="chatMsg" placeholder="Ketik pesan...">
    <button onclick="sendChat()" class="btn-hmi">Kirim</button>
  </div>

</div>


<div id="toast"></div>


<audio id="notifSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script type="module" src="js/app.js"></script>
</body>
</html>
