<!DOCTYPE html>
<html>
<head>
<title>HMI Super App</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}

/* TOPBAR */
.topbar{
  background:#0b6623;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:-250px;
  top:0;
  width:250px;
  height:100%;
  background:#000;
  transition:0.3s;
  padding:20px;
}
.sidebar.active{left:0;}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#0b6623;
  color:white;
}

/* CHAT */
#chatList div{
  margin:5px;
  padding:10px;
  border-radius:10px;
  background:#eee;
  color:black;
}

/* PREVIEW */
#previewBox img, video{
  margin:5px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <h3>Menu</h3>
  <button onclick="openChat()">Chat</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- LOGIN -->
<div id="auth">
  <h2>Login</h2>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
  <button onclick="loginGoogle()">Google</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="topbar">
  <span onclick="toggleMenu()">☰</span>
  <b>Chat App</b>
</div>

<!-- CHAT -->
<div id="chatBox">
  <div id="chatList" style="height:300px;overflow:auto;"></div>

  <input id="privateInput" placeholder="Pesan...">
  <input type="file" id="multiFile" multiple accept="image/*,video/*">

  <div id="previewBox"></div>

  <button onclick="kirimPrivate()">Kirim</button>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA_SW13O3EPp6L6TGT3UV5B2ADzwCV_Owo",
  authDomain: "hmi-app-ac76d.firebaseapp.com",
  projectId: "hmi-app-ac76d",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

/* LOGIN */
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value);
}

/* GOOGLE */
function loginGoogle(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

/* STATE */
auth.onAuthStateChanged(user=>{
  if(user){
    authDiv.style.display="none";
    app.style.display="block";
    loadChat();
  }else{
    authDiv.style.display="block";
    app.style.display="none";
  }
});

/* SIDEBAR */
function toggleMenu(){
  sidebar.classList.toggle("active");
}

/* LOGOUT */
function logout(){auth.signOut();}

/* =========================
   MULTI FILE SYSTEM
========================= */

let selectedFiles=[];
let uploadTasks={};

/* PREVIEW */
multiFile.onchange = ()=>{
  previewBox.innerHTML="";
  selectedFiles = Array.from(multiFile.files);

  selectedFiles.forEach(file=>{
    let el;

    if(file.type.startsWith("image")){
      el = document.createElement("img");
      el.src = URL.createObjectURL(file);
      el.width = 100;
    }
    else{
      el = document.createElement("video");
      el.src = URL.createObjectURL(file);
      el.width = 120;
      el.controls=true;
    }

    previewBox.appendChild(el);
  });
};

/* SEND */
async function kirimPrivate(){

  let docRef = await db.collection("chat").add({
    nama: auth.currentUser.email,
    pesan: privateInput.value,
    uid: auth.currentUser.uid,
    waktu:new Date(),
    read:false,
    status:"sending",
    files:selectedFiles.map(f=>({
      type:f.type.startsWith("image")?"img":"video",
      url:"",
      progress:0,
      uploading:true
    }))
  });

  let id = docRef.id;

  privateInput.value="";
  previewBox.innerHTML="";
  multiFile.value="";

  selectedFiles.forEach((file,i)=>{
    startUpload(file,docRef,id,i);
  });

  if(selectedFiles.length===0){
    docRef.update({status:"sent"});
  }

  selectedFiles=[];
}

/* UPLOAD */
function startUpload(file, docRef, id, index){

  let ref = storage.ref("chat/"+Date.now()+"_"+file.name);
  let task = ref.put(file);

  if(!uploadTasks[id]) uploadTasks[id]={};
  uploadTasks[id][index]=task;

  task.on("state_changed",

    (snap)=>{
      let percent = (snap.bytesTransferred/snap.totalBytes)*100;

      docRef.get().then(d=>{
        let files = d.data().files;
        files[index].progress=Math.floor(percent);
        docRef.update({files});
      });
    },

    ()=>{
      docRef.update({status:"failed"});
    },

    ()=>{
      ref.getDownloadURL().then(url=>{
        docRef.get().then(d=>{
          let files=d.data().files;

          files[index].url=url;
          files[index].uploading=false;
          files[index].progress=100;

          docRef.update({files,status:"sent"});
        });
      });
    }
  );
}

/* CANCEL */
function cancelUpload(id,index){
  if(uploadTasks[id] && uploadTasks[id][index]){
    uploadTasks[id][index].cancel();
  }
}

/* LOAD CHAT */
function loadChat(){
  db.collection("chat").orderBy("waktu")
  .onSnapshot(snap=>{
    chatList.innerHTML="";

    snap.forEach(doc=>{
      let d=doc.data();
      let div=document.createElement("div");

      let status = d.status==="failed"?"❌":
                   d.read?"✔✔":"✔";

      div.innerHTML = `<b>${d.nama}</b><br>${d.pesan}<br>${status}`;

      d.files?.forEach((f,i)=>{

        if(f.type==="img"){
          div.innerHTML += `<br><img src="${f.url}" width="120">`;
        }

        if(f.type==="video"){
          div.innerHTML += `<br>
          <video width="150" controls>
            <source src="${f.url}">
          </video>`;
        }

        if(f.uploading){
          div.innerHTML += `<br>Uploading ${f.progress}%`;

          let btn=document.createElement("button");
          btn.textContent="Cancel";
          btn.onclick=()=>cancelUpload(doc.id,i);
          div.appendChild(btn);
        }

      });

      chatList.appendChild(div);
    });

    chatList.scrollTop = chatList.scrollHeight;
  });
}
</script>

</body>
</html>
