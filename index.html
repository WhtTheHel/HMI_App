<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HMI App</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0b6623,#000);
  color:white;
}

/* HEADER */
.header {
  display:flex;
  align-items:center;
  padding:10px;
  background:#0b6623;
}

.menu-btn {
  font-size:24px;
  cursor:pointer;
  margin-right:10px;
}

/* SIDEBAR */
.sidebar {
  position:fixed;
  top:0;
  left:-250px;
  width:250px;
  height:100%;
  background:#111;
  padding:20px;
  transition:0.3s;
}

.sidebar button {
  width:100%;
  margin:5px 0;
}

/* CONTENT */
.container {
  padding:15px;
}

/* CARD */
.card {
  background:white;
  color:black;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
}

/* INPUT */
input, button {
  padding:10px;
  margin:5px 0;
  width:100%;
  border-radius:8px;
  border:none;
}

button {
  background:#0b6623;
  color:white;
}

/* LIST */
li {
  margin:10px 0;
}

/* HIDDEN */
.hidden {
  display:none;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Menu</h3>
  <button onclick="loadData('anggota');closeMenu()">Anggota</button>
  <button onclick="loadData('agenda');closeMenu()">Agenda</button>
  <button onclick="loadData('keuangan');closeMenu()">Keuangan</button>
  <button onclick="loadData('pengumuman');closeMenu()">Pengumuman</button>
  <button onclick="loadData('notulen');closeMenu()">Notulen</button>
  <hr>
  <button onclick="openDashboard()">Admin</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- HEADER -->
<div class="header hidden" id="header">
  <span class="menu-btn" onclick="openMenu()">☰</span>
  <h3>HMI App</h3>
</div>

<div class="container">

<!-- LOGIN -->
<div class="card" id="auth">
  <h2>Login / Register</h2>
  <input id="namaUser" placeholder="Nama">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="card">
    <input id="search" placeholder="Cari..." onkeyup="cariData()">
  </div>

  <div class="card">
    <input id="inputData" placeholder="Tambah data">
    <button onclick="tambahData()">Tambah</button>
  </div>

  <div class="card">
    <ul id="list"></ul>
  </div>

  <!-- DASHBOARD -->
  <div class="card hidden" id="dashboard">
    <h3>Dashboard</h3>
    <p>Anggota: <span id="totalAnggota">0</span></p>
    <p>Agenda: <span id="totalAgenda">0</span></p>
    <p>Keuangan: <span id="totalKeuangan">0</span></p>
    <p>Pengumuman: <span id="totalPengumuman">0</span></p>
    <button onclick="closeDashboard()">Tutup</button>
  </div>

</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "ISI_PUNYA_KAMU",
  authDomain: "ISI_PUNYA_KAMU",
  projectId: "ISI_PUNYA_KAMU"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentCollection = "anggota";
let semuaData = [];
let userRole = "anggota";

// MENU
function openMenu(){ sidebar.style.left="0"; }
function closeMenu(){ sidebar.style.left="-250px"; }

// LOGIN
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .catch(e=>alert(e.message));
}

// REGISTER
function register(){
  auth.createUserWithEmailAndPassword(email.value,password.value)
  .then(res=>{
    db.collection("users").doc(res.user.uid).set({
      nama:namaUser.value,
      role:"anggota"
    });
    alert("Register berhasil");
  });
}

// LOGOUT
function logout(){ auth.signOut(); }

// AUTH CHECK
auth.onAuthStateChanged(user=>{
  if(user){
    authBox.style.display="none";
    app.style.display="block";
    header.classList.remove("hidden");

    db.collection("users").doc(user.uid).get().then(doc=>{
      userRole = doc.data()?.role || "anggota";
    });

  } else {
    authBox.style.display="block";
    app.style.display="none";
    header.classList.add("hidden");
  }
});

// LOAD DATA
function loadData(col){
  currentCollection=col;

  db.collection(col).onSnapshot(snap=>{
    semuaData=[];
    snap.forEach(doc=>{
      semuaData.push({id:doc.id, isi:doc.data().isi});
    });
    tampilkan(semuaData);
  });
}

// TAMPILKAN
function tampilkan(data){
  list.innerHTML="";
  data.forEach(d=>{
    let li=document.createElement("li");
    li.innerHTML=d.isi;

    if(userRole==="admin"){
      let btn=document.createElement("button");
      btn.textContent="Hapus";
      btn.onclick=()=>hapus(d.id);
      li.appendChild(btn);
    }

    list.appendChild(li);
  });
}

// TAMBAH
function tambahData(){
  if(!inputData.value) return;
  db.collection(currentCollection).add({isi:inputData.value});
  inputData.value="";
}

// HAPUS
function hapus(id){
  db.collection(currentCollection).doc(id).delete();
}

// SEARCH
function cariData(){
  let k=search.value.toLowerCase();
  tampilkan(semuaData.filter(d=>d.isi.toLowerCase().includes(k)));
}

// DASHBOARD
function openDashboard(){
  if(userRole!=="admin") return alert("Admin saja");

  dashboard.classList.remove("hidden");

  db.collection("anggota").get().then(s=>totalAnggota.innerText=s.size);
  db.collection("agenda").get().then(s=>totalAgenda.innerText=s.size);
  db.collection("keuangan").get().then(s=>totalKeuangan.innerText=s.size);
  db.collection("pengumuman").get().then(s=>totalPengumuman.innerText=s.size);
}

function closeDashboard(){
  dashboard.classList.add("hidden");
}
</script>

</body>
</html>
