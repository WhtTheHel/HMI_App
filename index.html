<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>HMI Connect - V34 Integrated</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --hmi-green: #084d1e; --hmi-gold: #d4af37; --bg: #f8fafc; }
        body { margin: 0; background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; }
        * { box-sizing: border-box; }

        /* AUTH SCREEN */
        #authScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; background: white; }
        .auth-card { width: 100%; max-width: 350px; text-align: center; }

        /* MAIN APP (Hidden by default) */
        #mainApp { display: none; }
        .topbar { position: sticky; top: 0; background: var(--hmi-green); color: white; display: flex; justify-content: space-between; align-items: center; height: 65px; padding: 0 20px; border-bottom: 3px solid var(--hmi-gold); z-index: 1000; }
        .view-content { padding: 15px; display: none; min-height: 100vh; padding-bottom: 120px; }
        .view-content.active { display: block; }
        
        /* UI COMPONENTS */
        .card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid #edf2f7; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .btn-hmi { background: var(--hmi-green); color: white; border: none; padding: 14px; border-radius: 15px; font-weight: 800; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-hmi:disabled { opacity: 0.5; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #ddd; outline: none; }

        /* SIDEBAR */
        #sidebar { position: fixed; left: -320px; top: 0; width: 280px; height: 100%; background: white; transition: 0.3s; z-index: 9999; padding: 25px; box-shadow: 10px 0 30px rgba(0,0,0,0.1); }
        #sidebar.active { left: 0; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9000; }
        .avatar-nav { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--hmi-gold); object-fit: cover; background: #eee; }
    </style>
</head>
<body>

<div id="authScreen">
    <div class="auth-card">
        <img src="pngtree-hmi-organization-shield-logo-png-image_7307707.png" width="80" style="margin-bottom:20px;">
        <h2 style="color:var(--hmi-green); margin-bottom:5px;">HMI CONNECT</h2>
        <p style="font-size:12px; color:gray; margin-bottom:20px;">Silakan Masuk untuk Melanjutkan</p>
        
        <div id="loginForm">
            <input type="email" id="emailIn" placeholder="Email Kader">
            <input type="password" id="passIn" placeholder="Password">
            <button class="btn-hmi" id="btnLoginAction">MASUK</button>
            <p style="font-size:12px; margin-top:15px;">Belum punya akun? <a href="#" onclick="toggleAuth(false)" style="color:var(--hmi-green); font-weight:bold;">Daftar Disini</a></p>
        </div>

        <div id="regForm" style="display:none;">
            <input type="text" id="nameReg" placeholder="Nama Lengkap">
            <input type="email" id="emailReg" placeholder="Email">
            <input type="password" id="passReg" placeholder="Password Baru">
            <button class="btn-hmi" id="btnRegAction">DAFTAR KADER</button>
            <p style="font-size:12px; margin-top:15px;">Sudah punya akun? <a href="#" onclick="toggleAuth(true)" style="color:var(--hmi-green); font-weight:bold;">Login</a></p>
        </div>
    </div>
</div>

<div id="mainApp">
    <div id="overlay" onclick="window.toggleSidebar()"></div>
    
    <div class="topbar">
        <div onclick="window.toggleSidebar()" style="font-size:24px; cursor:pointer;">☰</div>
        <div style="display:flex; align-items:center; gap:8px;">
            <img src="pngtree-hmi-organization-shield-logo-png-image_7307707.png" width="30">
            <b id="vTitle">BERANDA</b>
        </div>
        <img id="navAva" onclick="document.getElementById('profileModal').style.display='flex'" class="avatar-nav">
    </div>

    <div id="sidebar">
        <div style="text-align:center; padding-bottom:20px; border-bottom:1px solid #eee;">
            <img id="sideAva" style="width:80px; height:80px; border-radius:50%; border:3px solid var(--hmi-gold); object-fit:cover; margin-bottom:10px;">
            <h4 id="sideName" style="margin:0;">Kader HMI</h4>
        </div>
        <div style="margin-top:20px;">
            <div style="padding:15px; font-weight:700; cursor:pointer;" onclick="window.showView('homeView', 'BERANDA')">🏠 Beranda</div>
            <div style="padding:15px; font-weight:700; cursor:pointer;" onclick="window.showView('groupView', 'GRUP DISKUSI')">👥 Grup Diskusi</div>
            <div style="padding:15px; font-weight:700; cursor:pointer; color:red; margin-top:50px;" id="btnLogout">🚪 Keluar</div>
        </div>
    </div>

    <div id="homeView" class="view-content active">
        <div class="card" style="border: 2px solid var(--hmi-green);">
            <textarea id="pInput" placeholder="Bagikan instruksi perjuangan..."></textarea>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <label for="pFile" style="background:#f1f5f9; padding:10px 15px; border-radius:10px; font-weight:bold; font-size:12px; cursor:pointer;">🖼️ Media</label>
                <input type="file" id="pFile" accept="image/*,video/*" style="display:none;" onchange="window.handlePostMedia(this)">
                <button class="btn-hmi" id="btnPost" style="width:auto; padding:10px 25px; margin:0;">POSTING</button>
            </div>
            <div id="pNotify" style="display:none; color:green; font-size:11px; margin-top:8px; font-weight:bold;">✅ Media siap!</div>
        </div>
        <div id="feed"></div>
    </div>

    <div id="groupView" class="view-content">
        <div id="chatBox" class="card" style="height:65vh; overflow-y:auto; display:flex; flex-direction:column; gap:10px;"></div>
        <div style="display:flex; gap:8px; background:white; padding:10px; border-radius:20px; border:1px solid #ddd;">
            <input type="text" id="cInput" placeholder="Ketik pesan..." style="border:none; margin:0; flex:1;">
            <button id="btnChat" class="btn-hmi" style="width:auto; padding:8px 20px; margin:0;">KIRIM</button>
        </div>
    </div>
</div>

<div id="profileModal" class="modal">
    <div class="modal-body">
        <h3>Edit Profil</h3>
        <input type="file" id="upAvatar" accept="image/*" style="display:none;" onchange="window.handleAvatarPreview(this)">
        <img id="viewAvatar" src="" style="width:100px; height:100px; border-radius:50%; object-fit:cover; border:3px solid var(--hmi-gold); cursor:pointer;" onclick="document.getElementById('upAvatar').click()">
        <input type="text" id="upNama" placeholder="Nama Lengkap">
        <button class="btn-hmi" id="btnSaveProfile">SIMPAN PERUBAHAN</button>
        <button onclick="document.getElementById('profileModal').style.display='none'" style="border:none; background:none; color:red; margin-top:15px; font-weight:bold;">BATAL</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
    import { getFirestore, doc, onSnapshot, collection, query, orderBy, addDoc, deleteDoc, updateDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

    const firebaseConfig = { apiKey: "AIzaSyA_SW13O3EPp6L6TGT3UV5B2ADzwCV_Owo", authDomain: "hmi-app-ac76d.firebaseapp.com", projectId: "hmi-app-ac76d" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let postMedia = "", tempAva = "";

    // --- AUTH UI TOGGLE ---
    window.toggleAuth = (isLogin) => {
        document.getElementById('loginForm').style.display = isLogin ? 'block' : 'none';
        document.getElementById('regForm').style.display = isLogin ? 'none' : 'block';
    };

    // --- AUTH OBSERVER (THE GATEKEEPER) ---
    onAuthStateChanged(auth, (user) => {
        if(user) {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            
            // Real-time Sync Profile
            onSnapshot(doc(db, "users", user.uid), (s) => {
                if(s.exists()){
                    const d = s.data();
                    const name = d.nama || user.displayName || "Kader HMI";
                    const ava = d.photoURL || `https://ui-avatars.com/api/?name=${name}&background=084d1e&color=fff`;
                    document.getElementById('sideName').innerText = name;
                    document.getElementById('navAva').src = document.getElementById('sideAva').src = document.getElementById('viewAvatar').src = ava;
                    document.getElementById('upNama').value = name;
                }
            });
            loadFeed();
        } else {
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
        }
    });

    // --- LOGIN & REGISTER ACTIONS ---
    document.getElementById('btnLoginAction').onclick = async () => {
        const e = document.getElementById('emailIn').value;
        const p = document.getElementById('passIn').value;
        try { await signInWithEmailAndPassword(auth, e, p); } catch(err) { alert("Login Gagal: " + err.message); }
    };

    document.getElementById('btnRegAction').onclick = async () => {
        const n = document.getElementById('nameReg').value;
        const e = document.getElementById('emailReg').value;
        const p = document.getElementById('passReg').value;
        if(!n) return alert("Nama wajib diisi!");
        try {
            const res = await createUserWithEmailAndPassword(auth, e, p);
            await setDoc(doc(db, "users", res.user.uid), { nama: n, photoURL: "" });
            await updateProfile(res.user, { displayName: n });
            alert("Berhasil Daftar!");
        } catch(err) { alert("Daftar Gagal: " + err.message); }
    };

    // --- MAIN APP ACTIONS ---
    document.getElementById('btnLogout').onclick = () => { if(confirm("Keluar?")) signOut(auth); };

    window.toggleSidebar = () => {
        const a = document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').style.display = a ? 'block' : 'none';
    };

    window.showView = (id, title) => {
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('vTitle').innerText = title;
        window.toggleSidebar();
        if(id === 'groupView') loadChat();
    };

    // --- POST & PROFILE ---
    window.handlePostMedia = (i) => {
        const r = new FileReader();
        r.onload = () => { postMedia = r.result; document.getElementById('pNotify').style.display = 'block'; };
        r.readAsDataURL(i.files[0]);
    };

    document.getElementById('btnPost').onclick = async () => {
        const txt = document.getElementById('pInput').value;
        if(!txt && !postMedia) return;
        const btn = document.getElementById('btnPost'); btn.disabled = true;
        await addDoc(collection(db, "posts"), {
            uid: auth.currentUser.uid, name: document.getElementById('sideName').innerText,
            ava: document.getElementById('sideAva').src, text: txt, media: postMedia,
            likes: [], time: Date.now()
        });
        document.getElementById('pInput').value = ""; postMedia = "";
        document.getElementById('pNotify').style.display = 'none'; btn.disabled = false;
    };

    document.getElementById('btnSaveProfile').onclick = async () => {
        const name = document.getElementById('upNama').value;
        const upData = { nama: name };
        if(tempAva) upData.photoURL = tempAva;
        await updateDoc(doc(db, "users", auth.currentUser.uid), upData);
        await updateProfile(auth.currentUser, { displayName: name, photoURL: tempAva || auth.currentUser.photoURL });
        alert("Profil diperbarui!");
        document.getElementById('profileModal').style.display = 'none';
    };

    window.handleAvatarPreview = (i) => {
        const r = new FileReader();
        r.onload = () => { tempAva = r.result; document.getElementById('viewAvatar').src = r.result; };
        r.readAsDataURL(i.files[0]);
    };

    // --- RENDER FEED & CHAT ---
    function loadFeed() {
        onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), (sn) => {
            const f = document.getElementById('feed'); f.innerHTML = "";
            sn.forEach(d => {
                const p = d.data();
                f.innerHTML += `<div class="card">
                    <div style="display:flex; gap:10px; align-items:center; margin-bottom:10px;">
                        <img src="${p.ava}" style="width:40px; height:40px; border-radius:50%; object-fit:cover; border:2px solid var(--hmi-gold);">
                        <b>${p.name}</b>
                        ${p.uid === auth.currentUser.uid ? `<b onclick="window.delP('${d.id}')" style="margin-left:auto; color:red; cursor:pointer;">✕</b>` : ''}
                    </div>
                    <p>${p.text}</p>${p.media ? `<img src="${p.media}" style="width:100%; border-radius:10px;">` : ''}
                </div>`;
            });
        });
    }

    function loadChat() {
        onSnapshot(query(collection(db, "chats"), orderBy("time", "asc")), (sn) => {
            const b = document.getElementById('chatBox'); b.innerHTML = "";
            sn.forEach(d => {
                const c = d.data(); const isMe = c.uid === auth.currentUser.uid;
                b.innerHTML += `<div style="max-width:80%; padding:10px; border-radius:12px; align-self:${isMe?'flex-end':'flex-start'}; background:${isMe?'var(--hmi-green)':'#eee'}; color:${isMe?'white':'black'}; margin-bottom:5px;">
                    <small><b>${isMe?'Anda':c.name}</b></small><br>${c.text||''}
                </div>`;
            });
            b.scrollTop = b.scrollHeight;
        });
    }

    document.getElementById('btnChat').onclick = async () => {
        const txt = document.getElementById('cInput').value;
        if(!txt) return;
        await addDoc(collection(db, "chats"), {
            uid: auth.currentUser.uid, name: document.getElementById('sideName').innerText,
            text: txt, time: Date.now()
        });
        document.getElementById('cInput').value = "";
    };

    window.delP = async (id) => { if(confirm("Hapus?")) await deleteDoc(doc(db,"posts",id)); };
</script>
</body>
</html>
