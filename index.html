<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>HMI Connect - V42 Members List</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --hmi-green: #084d1e; --hmi-black: #1a1a1a; --hmi-gold: #d4af37; --bg: #f0f2f5; }
        body { margin: 0; background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--hmi-black); overflow-x: hidden; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* AUTH & TOPBAR */
        #authLayer { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 25px; background: #fff; }
        #appLayer { display: none; }
        .topbar { position: sticky; top: 0; background: var(--hmi-green); color: white; display: flex; justify-content: space-between; align-items: center; height: 65px; padding: 0 20px; border-bottom: 4px solid var(--hmi-black); z-index: 9999; }
        .nav-ava { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--hmi-gold); object-fit: cover; background: #333; cursor: pointer; }
        
        /* SIDEBAR */
        #sidebar { position: fixed; left: -300px; top: 0; width: 280px; height: 100%; background: white; transition: 0.3s; z-index: 10001; padding: 25px; box-shadow: 10px 0 30px rgba(0,0,0,0.1); }
        #sidebar.active { left: 0; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 10000; backdrop-filter: blur(2px); }

        /* UI COMPONENTS */
        .card { background: white; border-radius: 18px; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; position: relative; }
        .btn-hmi { background: var(--hmi-green); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-hmi:disabled { background: #ccc; }
        
        .view-content { display: none; padding: 15px; padding-bottom: 100px; }
        .view-content.active { display: block; }
        
        .post-media { width: 100%; border-radius: 12px; margin-top: 12px; display: block; background: #000; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1.5px solid #eee; outline: none; }

        .badge-admin { background: var(--hmi-gold); color: black; font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 800; display: inline-block; }
        .member-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #eee; }
        
        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 20000; align-items: center; justify-content: center; padding: 20px; }
        .modal-body { background: white; padding: 25px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; }
    </style>
</head>
<body>

<div id="authLayer">
    <div style="text-align:center; width:100%; max-width:360px;">
        <img src="pngtree-hmi-organization-shield-logo-png-image_7307707.png" width="90">
        <h2 style="color:var(--hmi-green)">HMI CONNECT</h2>
        <div id="loginBox">
            <input type="email" id="logEmail" placeholder="Email Kader">
            <input type="password" id="logPass" placeholder="Password">
            <button class="btn-hmi" id="btnSignIn">MASUK</button>
            <button class="btn-hmi" style="background:#fff; color:#444; border:1px solid #ddd;" id="btnGoogleAuth">Google Login</button>
            <p style="font-size:13px; margin-top:20px;">Belum ada akun? <b onclick="toggleAuth(false)" style="color:var(--hmi-green); cursor:pointer;">Daftar</b></p>
        </div>
        <div id="regBox" style="display:none;">
            <input type="text" id="regName" placeholder="Nama Lengkap">
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPass" placeholder="Password">
            <button class="btn-hmi" id="btnSignUp">BUAT AKUN</button>
            <p style="font-size:13px; margin-top:20px;"><b onclick="toggleAuth(true)" style="color:var(--hmi-green); cursor:pointer;">Kembali Login</b></p>
        </div>
    </div>
</div>

<div id="appLayer">
    <div id="overlay" onclick="toggleSidebar()"></div>
    <div class="topbar">
        <div style="font-size:28px; cursor:pointer; color:var(--hmi-gold);" onclick="toggleSidebar()">☰</div>
        <b id="pageTitle">BERANDA</b>
        <img id="navAva" class="nav-ava" onclick="openProfile()">
    </div>

    <div id="sidebar">
        <div style="text-align:center; padding-bottom:20px; border-bottom:2px solid #eee;">
            <img id="sideAva" style="width:70px; height:70px; border-radius:50%; border:3px solid var(--hmi-green); object-fit:cover;">
            <h4 id="sideName" style="margin:10px 0 0 0;">Kader</h4>
            <div id="roleBadge"></div>
        </div>
        <div style="margin-top:25px;">
            <div style="padding:15px; font-weight:800; cursor:pointer;" onclick="changeView('homeView', 'BERANDA')">🏠 Beranda</div>
            <div style="padding:15px; font-weight:800; cursor:pointer;" onclick="changeView('groupView', 'GRUP DISKUSI')">👥 Grup Diskusi</div>
            <div style="padding:15px; font-weight:800; cursor:pointer;" onclick="changeView('memberView', 'DAFTAR ANGGOTA')">📖 Daftar Anggota</div>
            <div id="adminMenu" style="display:none; padding:15px; font-weight:800; cursor:pointer; color:var(--hmi-gold);" onclick="changeView('adminPanel', 'ADMIN PANEL')">🛡️ Persetujuan Kader</div>
            <div style="padding:15px; font-weight:800; cursor:pointer; color:red; margin-top:40px;" onclick="doLogout()">🚪 Keluar</div>
        </div>
    </div>

    <div id="homeView" class="view-content active">
        <div class="card" style="border-left: 5px solid var(--hmi-green);">
            <textarea id="pInput" placeholder="Tulis instruksi atau posting video..."></textarea>
            <div id="prevArea" style="display:none; margin-bottom:10px;">
                <p id="fileTypeNote" style="font-size:10px; font-weight:bold; color:var(--hmi-green);"></p>
                <button onclick="resetMedia()" style="background:red; color:white; border:none; padding:2px 10px;">Batal</button>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <label for="pFile" style="background:#eee; padding:10px; border-radius:10px; font-size:12px; cursor:pointer;">📷 Media</label>
                <input type="file" id="pFile" accept="image/*,video/*" style="display:none;">
                <button class="btn-hmi" id="btnPost" style="width:auto; padding:8px 20px; margin:0;">KIRIM</button>
            </div>
        </div>
        <div id="feed"></div>
    </div>

    <div id="groupView" class="view-content">
        <div id="chatLocked" style="display:none; text-align:center; padding:50px 20px;">
            <h3>Akses Terbatas</h3>
            <button class="btn-hmi" id="btnRequestJoin">MINTA AKSES</button>
        </div>
        <div id="chatActive" style="display:none;">
            <div id="chatBox" style="height:60vh; overflow-y:auto; display:flex; flex-direction:column; gap:10px; margin-bottom:15px; background:white; padding:10px; border-radius:15px;"></div>
            <div class="card" style="margin:0; padding:10px;">
                <input type="text" id="cInput" placeholder="Ketik pesan...">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label for="cFile" style="cursor:pointer; font-size:18px;">📎</label>
                    <input type="file" id="cFile" accept="image/*,video/*" style="display:none;">
                    <button id="btnChat" class="btn-hmi" style="width:auto; padding:5px 20px;">KIRIM</button>
                </div>
            </div>
        </div>
    </div>

    <div id="memberView" class="view-content">
        <h3 style="color:var(--hmi-green)">Daftar Admin & Owner</h3>
        <div id="listAdmin" class="card"></div>
        
        <h3 style="color:var(--hmi-green); margin-top:20px;">Daftar Anggota / Kader</h3>
        <div id="listKader" class="card"></div>
    </div>

    <div id="adminPanel" class="view-content">
        <h3>Persetujuan Kader</h3>
        <div id="listPendingUsers"></div>
    </div>
</div>

<div id="profileModal" class="modal">
    <div class="modal-body">
        <h3>Profil Kader</h3>
        <input type="file" id="upAvaFile" accept="image/*" style="display:none;">
        <img id="viewAva" src="" style="width:100px; height:100px; border-radius:50%; object-fit:cover; border:4px solid var(--hmi-green); cursor:pointer;" onclick="document.getElementById('upAvaFile').click()">
        <input type="text" id="upNama" placeholder="Nama Lengkap">
        <button class="btn-hmi" id="btnSaveProfile">SIMPAN</button>
        <button onclick="closeProfile()" style="color:red; background:none; border:none; margin-top:10px;">TUTUP</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, GoogleAuthProvider, signInWithPopup } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
    import { getFirestore, doc, onSnapshot, collection, query, orderBy, where, addDoc, setDoc, updateDoc, deleteDoc, getDoc, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

    const firebaseConfig = { apiKey: "AIzaSyA_SW13O3EPp6L6TGT3UV5B2ADzwCV_Owo", authDomain: "hmi-app-ac76d.firebaseapp.com", projectId: "hmi-app-ac76d" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let me = null, myData = null, mediaData = "", mediaType = "";

    // --- NAVIGATION ---
    window.toggleSidebar = () => {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none';
    };

    window.changeView = (id, title) => {
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('pageTitle').innerText = title;
        if(window.innerWidth < 768) toggleSidebar();
        if(id === 'groupView') checkAccess();
        if(id === 'adminPanel') loadPending();
        if(id === 'memberView') loadMembers();
    };

    // --- AUTH ---
    onAuthStateChanged(auth, (user) => {
        if(user) {
            me = user;
            document.getElementById('authLayer').style.display = 'none';
            document.getElementById('appLayer').style.display = 'block';
            sync(user); loadFeed();
        } else {
            document.getElementById('authLayer').style.display = 'flex';
            document.getElementById('appLayer').style.display = 'none';
        }
    });

    function sync(user) {
        onSnapshot(doc(db, "users", user.uid), (s) => {
            if(s.exists()){
                myData = s.data();
                const ava = myData.photoURL || `https://ui-avatars.com/api/?name=${myData.nama}&background=084d1e&color=fff`;
                document.getElementById('navAva').src = document.getElementById('sideAva').src = document.getElementById('viewAva').src = ava;
                document.getElementById('sideName').innerText = myData.nama;
                if(myData.role === 'admin') {
                    document.getElementById('adminMenu').style.display = 'block';
                    document.getElementById('roleBadge').innerHTML = '<span class="badge-admin">OWNER</span>';
                }
            }
        });
    }

    // --- MEMBER LIST SYSTEM ---
    async function loadMembers() {
        const sn = await getDocs(collection(db, "users"));
        const adminDiv = document.getElementById('listAdmin');
        const kaderDiv = document.getElementById('listKader');
        adminDiv.innerHTML = ""; kaderDiv.innerHTML = "";

        sn.forEach(u => {
            const user = u.data();
            const ava = user.photoURL || `https://ui-avatars.com/api/?name=${user.nama}&background=084d1e&color=fff`;
            const html = `
                <div class="member-item">
                    <img src="${ava}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                    <div>
                        <b style="font-size:14px;">${user.nama}</b><br>
                        <small style="color:gray;">${user.role === 'admin' ? '🛡️ Administrator' : '👤 Anggota'}</small>
                    </div>
                </div>`;
            if(user.role === 'admin') adminDiv.innerHTML += html;
            else kaderDiv.innerHTML += html;
        });
    }

    // --- MEDIA & POSTING ---
    document.getElementById('upAvaFile').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (res) => document.getElementById('viewAva').src = res.target.result;
        reader.readAsDataURL(e.target.files[0]);
    };

    document.getElementById('btnSaveProfile').onclick = async () => {
        await updateDoc(doc(db, "users", me.uid), { 
            nama: document.getElementById('upNama').value, 
            photoURL: document.getElementById('viewAva').src 
        });
        closeProfile();
    };

    function handleFile(e, prefix) {
        const file = e.target.files[0];
        mediaType = file.type.split('/')[0];
        const reader = new FileReader();
        reader.onload = (res) => {
            mediaData = res.target.result;
            if(prefix === 'p') {
                document.getElementById('prevArea').style.display = 'block';
                document.getElementById('fileTypeNote').innerText = `✅ ${mediaType.toUpperCase()} SIAP`;
            }
        };
        reader.readAsDataURL(file);
    }
    document.getElementById('pFile').onchange = (e) => handleFile(e, 'p');
    document.getElementById('cFile').onchange = (e) => handleFile(e, 'c');
    window.resetMedia = () => { mediaData = ""; document.getElementById('prevArea').style.display = 'none'; };

    document.getElementById('btnPost').onclick = async () => {
        await addDoc(collection(db, "posts"), {
            uid: me.uid, name: myData.nama, ava: document.getElementById('sideAva').src,
            text: document.getElementById('pInput').value, media: mediaData, type: mediaType, time: Date.now()
        });
        document.getElementById('pInput').value = ""; resetMedia();
    };

    function loadFeed() {
        onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), (sn) => {
            const f = document.getElementById('feed'); f.innerHTML = "";
            sn.forEach(d => {
                const p = d.data();
                const canDel = (p.uid === me.uid) || (myData?.role === 'admin');
                f.innerHTML += `<div class="card">
                    <div style="display:flex; gap:10px; align-items:center; margin-bottom:10px;">
                        <img src="${p.ava}" style="width:35px; height:35px; border-radius:50%; object-fit:cover;">
                        <b>${p.name}</b>
                        ${canDel ? `<b onclick="window.delDoc('posts','${d.id}')" style="margin-left:auto; color:red; cursor:pointer;">✕</b>` : ''}
                    </div>
                    <p>${p.text}</p>
                    ${p.media ? (p.type === 'video' ? `<video src="${p.media}" class="post-media" controls></video>` : `<img src="${p.media}" class="post-media">`) : ''}
                </div>`;
            });
        });
    }

    // --- GROUP & ADMIN LOGIC ---
    async function checkAccess() {
        const ud = (await getDoc(doc(db, "users", me.uid))).data();
        if(ud.groupAccess || ud.role === 'admin') {
            document.getElementById('chatLocked').style.display = 'none';
            document.getElementById('chatActive').style.display = 'block';
            loadChat();
        } else {
            document.getElementById('chatLocked').style.display = 'block';
            document.getElementById('chatActive').style.display = 'none';
        }
    }

    document.getElementById('btnRequestJoin').onclick = async () => {
        await updateDoc(doc(db, "users", me.uid), { statusJoin: "pending" });
        alert("Permintaan dikirim!");
    };

    function loadChat() {
        onSnapshot(query(collection(db, "chats"), orderBy("time", "asc")), (sn) => {
            const b = document.getElementById('chatBox'); b.innerHTML = "";
            sn.forEach(d => {
                const c = d.data(); const isMe = c.uid === me.uid;
                b.innerHTML += `<div style="max-width:80%; padding:10px; border-radius:12px; align-self:${isMe?'flex-end':'flex-start'}; background:${isMe?'var(--hmi-green)':'#eee'}; color:${isMe?'white':'black'}; position:relative; margin-bottom:5px;">
                    ${(isMe || myData?.role === 'admin') ? `<small onclick="window.delDoc('chats','${d.id}')" style="position:absolute; top:-5px; right:-5px; color:red; cursor:pointer;">✕</small>` : ''}
                    <small><b>${c.name}</b></small><br>${c.text||''}
                    ${c.media ? (c.type === 'video' ? `<video src="${c.media}" style="width:100%;" controls></video>` : `<img src="${c.media}" style="width:100%;">`) : ''}
                </div>`;
            });
            b.scrollTop = b.scrollHeight;
        });
    }

    document.getElementById('btnChat').onclick = async () => {
        await addDoc(collection(db, "chats"), { uid: me.uid, name: myData.nama, text: document.getElementById('cInput').value, media: mediaData, type: mediaType, time: Date.now() });
        document.getElementById('cInput').value = ""; mediaData = "";
    };

    async function loadPending() {
        const sn = await getDocs(query(collection(db, "users"), where("statusJoin", "==", "pending")));
        const list = document.getElementById('listPendingUsers');
        list.innerHTML = sn.empty ? "Kosong." : "";
        sn.forEach(u => {
            list.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <b>${u.data().nama}</b>
                <button class="btn-hmi" style="width:auto; padding:5px 15px;" onclick="window.approve('${u.id}')">SETUJU</button>
            </div>`;
        });
    }

    window.approve = async (id) => {
        await updateDoc(doc(db, "users", id), { groupAccess: true, statusJoin: "approved" });
        loadPending();
    };

    // --- OTHER AUTH ---
    document.getElementById('btnSignIn').onclick = async () => {
        try { await signInWithEmailAndPassword(auth, document.getElementById('logEmail').value, document.getElementById('logPass').value); } catch(e) { alert("Gagal Login"); }
    };
    document.getElementById('btnSignUp').onclick = async () => {
        const res = await createUserWithEmailAndPassword(auth, document.getElementById('regEmail').value, document.getElementById('regPass').value);
        await setDoc(doc(db, "users", res.user.uid), { nama: document.getElementById('regName').value, role: "kader", groupAccess: false });
    };
    document.getElementById('btnGoogleAuth').onclick = async () => {
        const res = await signInWithPopup(auth, provider);
        const uDoc = await getDoc(doc(db, "users", res.user.uid));
        if(!uDoc.exists()) await setDoc(doc(db, "users", res.user.uid), { nama: res.user.displayName, photoURL: res.user.photoURL, role: "kader", groupAccess: false });
    };

    // --- UTILS ---
    window.toggleAuth = (l) => { document.getElementById('loginBox').style.display=l?'block':'none'; document.getElementById('regBox').style.display=l?'none':'block'; };
    window.delDoc = async (c, i) => { if(confirm("Hapus?")) await deleteDoc(doc(db, c, i)); };
    window.openProfile = () => { document.getElementById('profileModal').style.display = 'flex'; };
    window.closeProfile = () => { document.getElementById('profileModal').style.display = 'none'; };
    window.doLogout = () => signOut(auth).then(()=>location.reload());
</script>
</body>
</html>
