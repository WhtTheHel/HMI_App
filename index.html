<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HMI Connect</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="authLayer">
  <h2>HMI CONNECT</h2>
  <input type="email" id="logEmail" placeholder="Email">
  <input type="password" id="logPass" placeholder="Password">
  <button id="btnSignIn">Login</button>
  <button id="btnGoogle">Login Google</button>
</div>

<div id="appLayer" style="display:none;">
  <div class="topbar">
    <div onclick="toggleSidebar()">☰</div>
    <b id="pageTitle">BERANDA</b>
    <div>🔔 <span id="notifBadge">0</span></div>
  </div>

  <div id="sidebar">
    <div onclick="changeView('homeView','BERANDA')">Beranda</div>
    <div onclick="toggleDarkMode()">🌙 Dark Mode</div>
    <div onclick="doLogout()">Logout</div>
  </div>

  <div id="homeView" class="view active">
    <textarea id="pInput"></textarea>
    <input type="file" id="pFile">
    <button id="btnPost">POST</button>
    <div id="feed"></div>
  </div>

  <div id="chatView" class="view">
    <div id="chatBox"></div>
    <input id="chatMsg">
    <button onclick="sendChat()">Kirim</button>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
