<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>HMI Connect - V72 Full Feature</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --hmi-green: #084d1e; --hmi-black: #1a1a1a; --hmi-gold: #d4af37; --bg: #f0f2f5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--hmi-black); }

        /* ANIMASI */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .view-content { display: none; padding: 15px; padding-bottom: 100px; }
        .view-content.active { display: block; animation: fadeIn 0.3s ease forwards; }

        /* HEADER & SIDEBAR */
        .topbar { position: sticky; top: 0; background: var(--hmi-green); color: white; display: flex; justify-content: space-between; align-items: center; height: 65px; padding: 0 20px; border-bottom: 4px solid var(--hmi-black); z-index: 9999; }
        #sidebar { position: fixed; left: -300px; top: 0; width: 280px; height: 100%; background: white; transition: 0.4s; z-index: 10001; padding: 25px; box-shadow: 10px 0 30px rgba(0,0,0,0.1); }
        #sidebar.active { left: 0; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 10000; backdrop-filter: blur(2px); }

        /* CARDS */
        .card { background: white; border-radius: 18px; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; animation: fadeIn 0.4s ease; }
        .btn-hmi { background: var(--hmi-green); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 800; cursor: pointer; }
        .btn-hmi:active { transform: scale(0.96); }

        /* ORG DROPDOWN STYLE */
        .cabang-box { background: white; border: 2px solid #eee; border-radius: 15px; margin-bottom: 10px; overflow: hidden; }
        .cabang-header { padding: 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: 800; }
        .cabang-header:active { background: #f9f9f9; }
        .komisariat-container { display: none; padding: 0 15px 15px 15px; background: #fafafa; border-top: 1px solid #eee; }
        .kom-item { background: white; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 14px; }

        /* UTILS */
        .pos-label { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
        .label-owner { background: var(--hmi-gold); color: black; }
        .label-admin { background: #007bff; color: white; }
        .post-media { width: 100%; border-radius: 12px; margin-top: 10px; background: #000; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 20000; align-items: center; justify-content: center; padding: 20px; }
        .modal-body { background: white; padding: 25px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1.5px solid #eee; outline: none; }
    </style>
</head>
<body>

<div id="authLayer" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 25px; text-align:center;">
    <img src="https://upload.wikimedia.org/wikipedia/id/0/00/Lambang_Himpunan_Mahasiswa_Islam.png" width="70">
    <h2 style="color:var(--hmi-green); margin:10px 0;">HMI CONNECT</h2>
    <div style="background:#f9f9f9; padding:12px; border-radius:10px; font-size:11px; border:1px dashed var(--hmi-green); margin-bottom:15px; line-height:1.5;">
        <b>Sejarah HMI:</b> Didirikan 5 Februari 1947 di Yogyakarta oleh Ayahanda Lafran Pane dkk.
    </div>
    <div id="loginBox" style="width:100%; max-width:300px;">
        <input type="email" id="logEmail" placeholder="Email">
        <input type="password" id="logPass" placeholder="Password">
        <button class="btn-hmi" style="width:100%" id="btnSignIn">MASUK</button>
    </div>
</div>

<div id="appLayer" style="display:none;">
    <div id="overlay" onclick="toggleSidebar()"></div>
    <div class="topbar">
        <div style="font-size:28px; cursor:pointer;" onclick="toggleSidebar()">☰</div>
        <b id="pageTitle">BERANDA</b>
        <div style="width:40px;"></div>
    </div>

    <div id="sidebar">
        <div style="text-align:center; padding-bottom:15px; border-bottom:1px solid #eee;">
            <img id="sideAva" style="width:65px; height:65px; border-radius:50%; object-fit:cover; border:2px solid var(--hmi-green);">
            <h4 id="sideName" style="margin:8px 0;">...</h4>
            <div id="roleBadge"></div>
        </div>
        <div style="margin-top:20px;">
            <div onclick="changeView('homeView', 'BERANDA')" style="padding:12px; font-weight:800; cursor:pointer;">🏠 Beranda</div>
            <div onclick="changeView('memberGlobalView', 'DAFTAR ANGGOTA')" style="padding:12px; font-weight:800; cursor:pointer;">👥 Anggota</div>
            <div onclick="changeView('cabangView', 'STRUKTUR')" style="padding:12px; font-weight:800; cursor:pointer;">🏢 Cabang & Komisariat</div>
            <div id="adminMenu" style="display:none; padding:12px; font-weight:800; cursor:pointer;" onclick="changeView('adminPanel', 'PERSETUJUAN')">🛡️ Persetujuan</div>
            <div onclick="doLogout()" style="color:red; padding:12px; font-weight:800; cursor:pointer; margin-top:20px;">🚪 Keluar</div>
        </div>
    </div>

    <div id="homeView" class="view-content active">
        <div class="card">
            <textarea id="pInput" placeholder="Apa ide perjuanganmu?" style="height:80px; border:none; resize:none;"></textarea>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <label for="pFile" style="background:#eee; padding:8px 15px; border-radius:8px; font-size:12px; font-weight:800; cursor:pointer;">📷 Media</label>
                <input type="file" id="pFile" accept="image/*,video/*" style="display:none;">
                <button class="btn-hmi" id="btnPost">POSTING</button>
            </div>
            <div id="mediaPreview" style="display:none; color:green; font-size:10px; margin-top:5px; font-weight:bold;">✅ File siap diunggah</div>
        </div>
        <div id="feed"></div>
    </div>

    <div id="memberGlobalView" class="view-content">
        <input type="text" placeholder="Cari Kader..." oninput="loadGlobalMembers(this.value)">
        <div id="listGlobalMembers"></div>
    </div>

    <div id="cabangView" class="view-content">
        <h3>Daftar Organisasi</h3>
        <div id="orgContainer"></div>
    </div>

    <div id="chatGroupView" class="view-content">
        <button onclick="changeView('cabangView', 'STRUKTUR')" class="btn-hmi" style="background:#ddd; color:black; margin-bottom:15px;">⬅️ Kembali</button>
        <h3 id="chatTitle">Grup</h3>
        <div id="chatBox" style="height:50vh; overflow-y:auto; background:#f0f0f0; padding:15px; border-radius:15px; display:flex; flex-direction:column; gap:10px;"></div>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <input type="text" id="chatMsg" placeholder="Tulis pesan..." style="margin:0;">
            <button class="btn-hmi" onclick="sendGroupChat()">KIRIM</button>
        </div>
    </div>

    <div id="adminPanel" class="view-content">
        <h3>Persetujuan Akun</h3>
        <div id="listPendingUsers"></div>
    </div>
</div>

<div id="manageModal" class="modal"><div class="modal-body">
    <h3 id="manageTitle">...</h3>
    <input type="text" id="editJabatan" placeholder="Jabatan">
    <button class="btn-hmi" style="width:100%" id="btnDoSave">SIMPAN PERUBAHAN</button>
    <div id="ownerSection" style="display:none; margin-top:10px; border-top:1px solid #eee; padding-top:10px;">
        <button id="btnRoleToggle" class="btn-hmi" style="background:#007bff; width:100%;"></button>
    </div>
    <button onclick="closeModal('manageModal')" style="margin-top:10px; background:none; border:none; color:gray;">BATAL</button>
</div></div>

<div id="addKomModal" class="modal"><div class="modal-body">
    <h3>Tambah Komisariat Baru</h3>
    <input type="text" id="newKomName" placeholder="Nama Komisariat">
    <button class="btn-hmi" style="width:100%" onclick="saveNewKom()">SIMPAN</button>
    <button onclick="closeModal('addKomModal')" style="margin-top:10px; background:none; border:none; color:gray;">BATAL</button>
</div></div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
    import { getFirestore, doc, onSnapshot, collection, query, orderBy, where, addDoc, updateDoc, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

    const firebaseConfig = { apiKey: "AIzaSyA_SW13O3EPp6L6TGT3UV5B2ADzwCV_Owo", authDomain: "hmi-app-ac76d.firebaseapp.com", projectId: "hmi-app-ac76d" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null, myData = null, targetId = "", targetRole = "", currentCabang = "", mediaData = "", mediaType = "";

    onAuthStateChanged(auth, (user) => {
        if(user) {
            me = user;
            onSnapshot(doc(db, "users", user.uid), (s) => {
                if(s.exists()){
                    myData = s.data();
                    document.getElementById('authLayer').style.display = 'none';
                    document.getElementById('appLayer').style.display = 'block';
                    document.getElementById('sideName').innerText = myData.nama;
                    document.getElementById('sideAva').src = myData.photoURL || `https://ui-avatars.com/api/?name=${myData.nama}`;
                    if(myData.role === 'admin' || myData.role === 'owner') document.getElementById('adminMenu').style.display = 'block';
                    document.getElementById('roleBadge').innerHTML = `<span class="pos-label ${myData.role==='owner'?'label-owner':'label-admin'}">${myData.role.toUpperCase()}</span>`;
                    loadFeed();
                }
            });
        }
    });

    // --- MANAJEMEN ANGGOTA ---
    window.loadGlobalMembers = async (search = "") => {
        const sn = await getDocs(collection(db, "users"));
        const div = document.getElementById('listGlobalMembers'); div.innerHTML = "";
        sn.forEach(u => {
            const user = u.data();
            if(search && !user.nama.toLowerCase().includes(search.toLowerCase())) return;
            const isMe = u.id === me.uid;
            const canManage = (myData.role === 'owner' && !isMe) || (myData.role === 'admin' && user.role === 'kader');

            div.innerHTML += `<div class="card" style="display:flex; align-items:center; justify-content:space-between;">
                <div style="display:flex; align-items:center; gap:12px;">
                    <img src="${user.photoURL || 'https://ui-avatars.com/api/?name='+user.nama}" style="width:45px; height:45px; border-radius:50%; object-fit:cover;">
                    <div><b>${user.nama}</b><br><span class="pos-label ${user.role==='owner'?'label-owner':'label-kader'}">${user.jabatan || user.role}</span></div>
                </div>
                ${canManage ? `<div style="font-size:20px; cursor:pointer;" onclick="openManage('${u.id}','${user.nama}','${user.jabatan}','${user.role}')">⚙️</div>` : ''}
            </div>`;
        });
    };

    window.openManage = (uid, n, j, r) => {
        targetId = uid; targetRole = r;
        document.getElementById('manageTitle').innerText = n;
        document.getElementById('editJabatan').value = j || "";
        document.getElementById('ownerSection').style.display = (myData.role === 'owner') ? 'block' : 'none';
        document.getElementById('btnRoleToggle').innerText = (r === 'admin') ? 'CABUT ADMIN' : 'JADIKAN ADMIN';
        document.getElementById('manageModal').style.display = 'flex';
    };

    document.getElementById('btnDoSave').onclick = async () => {
        await updateDoc(doc(db, "users", targetId), { jabatan: document.getElementById('editJabatan').value });
        closeModal('manageModal'); loadGlobalMembers();
    };

    document.getElementById('btnRoleToggle').onclick = async () => {
        const nextRole = (targetRole === 'admin') ? 'kader' : 'admin';
        await updateDoc(doc(db, "users", targetId), { role: nextRole });
        closeModal('manageModal'); loadGlobalMembers();
    };

    // --- CABANG DROPDOWN ---
    window.loadOrg = async () => {
        const div = document.getElementById('orgContainer'); div.innerHTML = "Memuat...";
        const snC = await getDocs(query(collection(db, "org_units"), where("type", "==", "Cabang")));
        div.innerHTML = "";
        
        // Default Cabang jika database kosong
        if(snC.empty) { createBox("Cabang Contoh", div); } 
        else { snC.forEach(d => createBox(d.data().name, div)); }
    };

    function createBox(name, div) {
        const box = document.createElement('div'); box.className = 'cabang-box';
        box.innerHTML = `
            <div class="cabang-header" onclick="toggleKom('${name}')">
                <span>🏢 ${name}</span> <span id="arr-${name}">▼</span>
            </div>
            <div id="kom-container-${name}" class="komisariat-container">
                <div id="kom-list-${name}"></div>
                ${(myData.role==='admin'||myData.role==='owner') ? `<button class="btn-hmi" style="font-size:11px; margin-top:10px;" onclick="openAddKom('${name}')">+ Tambah Komisariat</button>` : ''}
            </div>
        `;
        div.appendChild(box);
    }

    window.toggleKom = async (name) => {
        const con = document.getElementById(`kom-container-${name}`);
        const list = document.getElementById(`kom-list-${name}`);
        const arr = document.getElementById(`arr-${name}`);
        
        const isShowing = con.style.display === 'block';
        con.style.display = isShowing ? 'none' : 'block';
        arr.innerText = isShowing ? '▼' : '▲';

        if(!isShowing) {
            list.innerHTML = "Memuat...";
            const snK = await getDocs(query(collection(db, "org_units"), where("type", "==", "Komisariat"), where("parent", "==", name)));
            list.innerHTML = "";
            if(snK.empty) list.innerHTML = "<p style='font-size:11px; color:gray;'>Belum ada komisariat.</p>";
            snK.forEach(dk => {
                const k = dk.data();
                list.innerHTML += `<div class="kom-item" onclick="enterChat('${k.name}')">🏛️ ${k.name} <span>💬</span></div>`;
            });
        }
    };

    window.openAddKom = (c) => { currentCabang = c; document.getElementById('addKomModal').style.display = 'flex'; };
    window.saveNewKom = async () => {
        const n = document.getElementById('newKomName').value;
        if(!n) return;
        await addDoc(collection(db, "org_units"), { name: n, type: "Komisariat", parent: currentCabang });
        document.getElementById('newKomName').value = "";
        closeModal('addKomModal'); toggleKom(currentCabang);
    };

    // --- MEDIA POSTING (FOTO & VIDEO) ---
    document.getElementById('pFile').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        mediaType = file.type.split('/')[0];
        const reader = new FileReader();
        reader.onload = (r) => { 
            mediaData = r.target.result; 
            document.getElementById('mediaPreview').style.display = 'block';
        };
        reader.readAsDataURL(file);
    };

    document.getElementById('btnPost').onclick = async () => {
        const txt = document.getElementById('pInput').value;
        if(!txt && !mediaData) return;
        await addDoc(collection(db, "posts"), { uid: me.uid, name: myData.nama, text: txt, media: mediaData, type: mediaType, time: Date.now() });
        document.getElementById('pInput').value = ""; mediaData = ""; 
        document.getElementById('mediaPreview').style.display = 'none';
    };

    function loadFeed() {
        onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), (sn) => {
            const f = document.getElementById('feed'); f.innerHTML = "";
            sn.forEach(d => {
                const p = d.data();
                f.innerHTML += `<div class="card">
                    <b>${p.name}</b>
                    <p style="margin:5px 0;">${p.text}</p>
                    ${p.media ? (p.type==='video' ? `<video src="${p.media}" class="post-media" controls></video>` : `<img src="${p.media}" class="post-media">`) : ''}
                </div>`;
            });
        });
    }

    // --- NAVIGATION ---
    window.changeView = (id, title) => {
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('pageTitle').innerText = title;
        if(id === 'cabangView') loadOrg();
        if(id === 'memberGlobalView') loadGlobalMembers();
        if(window.innerWidth < 768) toggleSidebar();
    };

    window.toggleSidebar = () => {
        const s = document.getElementById('sidebar'); s.classList.toggle('active');
        document.getElementById('overlay').style.display = s.classList.contains('active') ? 'block' : 'none';
    };
    window.closeModal = (id) => document.getElementById(id).style.display = 'none';
    document.getElementById('btnSignIn').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('logEmail').value, document.getElementById('logPass').value);
</script>
</body>
    </html>
