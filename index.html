<!DOCTYPE html>
<html>
<head>
  <title>HMI App</title>
  <style>
    body {
      margin:0;
      font-family: Arial;
      background: linear-gradient(135deg, #0b6623, #000);
      color:white;
      text-align:center;
    }

    .container {
      padding:20px;
    }

    .card {
      background:white;
      color:black;
      padding:20px;
      margin:20px auto;
      border-radius:15px;
      width:90%;
      max-width:400px;
      box-shadow:0 5px 15px rgba(0,0,0,0.3);
    }

    input, button {
      padding:12px;
      margin:5px;
      width:90%;
      border-radius:8px;
      border:none;
    }

    button {
      background:#0b6623;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    .hidden {
      display:none;
    }

    .search-box {
      background:white;
      padding:10px;
      border-radius:10px;
      margin:10px;
      color:black;
    }

    .search-box input {
      width:80%;
    }

    img {
      margin-top:5px;
      border-radius:8px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>HMI</h1>

  <p>
    Himpunan Mahasiswa Islam adalah organisasi yang bertujuan 
    membina mahasiswa menjadi insan akademis, pencipta, pengabdi 
    yang bernafaskan Islam.
  </p>

  <!-- AUTH -->
  <div class="card" id="auth">
    <h2>Login / Register</h2>
    <input id="namaUser" placeholder="Nama"><br>
    <input id="email" placeholder="Email"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
  </div>


  <div id="app" class="hidden">

  <div class="topbar">
    <strong>Dashboard</strong>
    <div>
      <button onclick="openDashboard()">Admin</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- ADMIN DASHBOARD -->
  <div id="dashboard" class="card hidden">
    <h3>Admin Dashboard</h3>

    <p>Total Anggota: <b id="totalAnggota">0</b></p>
    <p>Total Agenda: <b id="totalAgenda">0</b></p>
    <p>Total Keuangan: <b id="totalKeuangan">0</b></p>
    <p>Total Pengumuman: <b id="totalPengumuman">0</b></p>

    <button onclick="closeDashboard()">Tutup</button>
  </div>

  <div class="card search-box">
    <input id="search" placeholder="Cari..." onkeyup="cariData()">
  </div>

  <div class="card menu">
    <button onclick="loadData('anggota')">Anggota</button>
    <button onclick="loadData('agenda')">Agenda</button>
    <button onclick="loadData('keuangan')">Keuangan</button>
    <button onclick="loadData('pengumuman')">Pengumuman</button>
    <button onclick="loadData('notulen')">Notulen</button>
  </div>

  <div class="card">
    <input id="inputData" placeholder="Tambah data">
    <button onclick="tambahData()">Tambah</button>
  </div>

  <div class="card">
    <ul id="list"></ul>
  </div>

  </div>
  
  <!-- APP -->
  <div id="app" class="hidden">

    <button onclick="logout()">Logout</button>

    <div class="search-box">
      🔍 <input id="search" placeholder="Cari..." onkeyup="cariData()">
    </div>

    <div class="card">
      <button onclick="loadData('anggota')">Anggota</button>
      <button onclick="loadData('agenda')">Agenda</button>
      <button onclick="loadData('keuangan')">Keuangan</button>
      <button onclick="loadData('pengumuman')">Pengumuman</button>
      <button onclick="loadData('notulen')">Notulen</button>
    </div>

    <div class="card">
      <input id="inputData" placeholder="Tambah data">
      <button onclick="tambahData()">Tambah</button>
    </div>

    <div class="card">
      <ul id="list"></ul>
    </div>

  </div>

</div>

<!-- FIREBASE (COMPAT) -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA_SW13O3EPp6L6TGT3UV5B2ADzwCV_Owo",
  authDomain: "hmi-app-ac76d.firebaseapp.com",
  projectId: "hmi-app-ac76d",
  storageBucket: "hmi-app-ac76d.firebasestorage.app",
  messagingSenderId: "985813799742",
  appId: "1:985813799742:web:1ac0aae6dc43d9a3eb126f",
  measurementId: "G-60Q8Z4XVXT"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// DOM
const email = document.getElementById("email");
const password = document.getElementById("password");
const namaUser = document.getElementById("namaUser");
const list = document.getElementById("list");
const search = document.getElementById("search");
const inputData = document.getElementById("inputData");

let currentCollection = "anggota";
let semuaData = [];
let userRole = "anggota";

// LOGIN
function login(){
  auth.signInWithEmailAndPassword(email.value, password.value)
  .catch(err => alert(err.message));
}

// REGISTER
function register(){
  auth.createUserWithEmailAndPassword(email.value, password.value)
  .then(res=>{
    db.collection("users").doc(res.user.uid).set({
      nama: namaUser.value,
      role: "anggota"
    });
    alert("Register berhasil");
  })
  .catch(err => alert(err.message));
}

// LOGOUT
function logout(){
  auth.signOut();
}

// CEK LOGIN
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";

    // ambil role user
    db.collection("users").doc(user.uid).get().then(doc=>{
      if(doc.exists){
        userRole = doc.data().role;
      }
    });

  } else {
    document.getElementById("auth").style.display="block";
    document.getElementById("app").style.display="none";
  }
});

// LOAD DATA
function loadData(col){
  currentCollection = col;

  db.collection(col).onSnapshot(snap=>{
    semuaData = [];
    snap.forEach(doc=>{
      semuaData.push({
        id: doc.id,
        isi: doc.data().isi || ""
      });
    });
    tampilkan(semuaData);
  });
}

// BUKA DASHBOARD
function openDashboard(){
  if(userRole !== "admin"){
    alert("Akses ditolak!");
    return;
  }

  document.getElementById("dashboard").classList.remove("hidden");

  // ambil statistik
  db.collection("anggota").onSnapshot(s=>{
    totalAnggota.innerText = s.size;
  });

  db.collection("agenda").onSnapshot(s=>{
    totalAgenda.innerText = s.size;
  });

  db.collection("keuangan").onSnapshot(s=>{
    totalKeuangan.innerText = s.size;
  });

  db.collection("pengumuman").onSnapshot(s=>{
    totalPengumuman.innerText = s.size;
  });
}

// TUTUP DASHBOARD
function closeDashboard(){
  document.getElementById("dashboard").classList.add("hidden");
}
  
// TAMPILKAN
function tampilkan(data){
  list.innerHTML = "";

  data.forEach(d=>{
    let li = document.createElement("li");

    let text = document.createElement("span");
    text.textContent = d.isi;

    li.appendChild(text);

    // tombol hapus (admin saja)
    if(userRole === "admin"){
      let btn = document.createElement("button");
      btn.textContent = "Hapus";
      btn.onclick = ()=>hapus(d.id);
      li.appendChild(document.createElement("br"));
      li.appendChild(btn);
    }

    list.appendChild(li);
  });
}

  
// TAMBAH
function tambahData(){
  if(inputData.value.trim() === "") return;

  db.collection(currentCollection).add({
    isi: inputData.value
  });

  inputData.value = "";
}

// HAPUS
function hapus(id){
  if(userRole !== "admin"){
    alert("Admin saja!");
    return;
  }

  db.collection(currentCollection).doc(id).delete();
}

// SEARCH
function cariData(){
  let k = search.value.toLowerCase();

  let hasil = semuaData.filter(d =>
    d.isi.toLowerCase().includes(k)
  );

  tampilkan(hasil);
}
</script>

</body>
</html>
