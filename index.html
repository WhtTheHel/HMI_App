<!DOCTYPE html>
<html>
<head>
<title>HMI Super App</title>

<style>
body{margin:0;font-family:Arial;background:#111;color:white}
.topbar{background:#0b6623;padding:12px;display:flex;justify-content:space-between}
.sidebar{position:fixed;left:-260px;top:0;width:260px;height:100%;background:#000;padding:15px;transition:.3s;overflow:auto}
.sidebar.active{left:0}
button{padding:10px;margin:5px;border:none;border-radius:8px;background:#0b6623;color:white}
.card{background:white;color:black;margin:10px;padding:10px;border-radius:10px}
.dark{background:#111}
.dark .card{background:#222;color:white}
#chatList div{margin:5px;padding:10px;border-radius:10px;background:#eee;color:black}
.me{background:#0b6623 !important;color:white !important}
.preview img,.preview video{width:80px;margin:5px;border-radius:6px}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
<h3>Menu</h3>

<img id="profilePic" width="70" style="border-radius:50%">
<p id="namaDisplay"></p>

<input type="file" id="editFoto">
<button onclick="updateFoto()">Ganti Foto</button>

<button onclick="toggleDark()">Dark Mode</button>
<button onclick="openGroup()">Chat Grup</button>
<button onclick="logout()">Logout</button>
</div>

<!-- AUTH -->
<div id="auth" class="card">
<h3>Login / Register</h3>
<input id="namaUser" placeholder="Nama Lengkap" style="display:none">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="showRegister()">Register</button>
<button onclick="loginGoogle()">Google</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="topbar">
<span onclick="toggleMenu()">☰</span>
<b>HMI SUPER APP</b>
</div>

<!-- CHAT -->
<div class="card">
<div id="chatList" style="height:300px;overflow:auto"></div>

<div id="typingStatus"></div>

<input id="chatInput" placeholder="Pesan..." oninput="typing()">
<input type="file" id="multiFile" multiple>

<div id="preview" class="preview"></div>

<button onclick="sendChat()">Kirim</button>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>

<script>
const firebaseConfig={apiKey:"AIzaSyA_SW13O3EPp6L6TGT3UV5B2ADzwCV_Owo",authDomain:"hmi-app-ac76d.firebaseapp.com",projectId:"hmi-app-ac76d"};
firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();
const storage=firebase.storage();

let selectedFiles=[];
let uploadTasks={};
let replyData=null;

/* ================= AUTH ================= */

function login(){
auth.signInWithEmailAndPassword(email.value,password.value);
}

function showRegister(){
namaUser.style.display="block";
}

function loginGoogle(){
const provider=new firebase.auth.GoogleAuthProvider();
auth.signInWithPopup(provider);
}

auth.onAuthStateChanged(user=>{
if(user){
auth.style.display="none";
app.style.display="block";

db.collection("users").doc(user.uid).get().then(doc=>{
if(!doc.exists){
db.collection("users").doc(user.uid).set({
nama:user.displayName||namaUser.value,
foto:user.photoURL||"",
role:"anggota",
online:true
});
}

let d=doc.data();
namaDisplay.innerText=d.nama;
if(d.foto) profilePic.src=d.foto;
});

setOnline(true);
loadChat();
}else{
auth.style.display="block";
app.style.display="none";
}
});

/* ================= UI ================= */

function toggleMenu(){sidebar.classList.toggle("active");}
function toggleDark(){document.body.classList.toggle("dark");}

/* ================= PROFILE ================= */

function updateFoto(){
let file=editFoto.files[0];
let user=auth.currentUser;

let ref=storage.ref("profile/"+user.uid);
ref.put(file).then(()=>{
ref.getDownloadURL().then(url=>{
db.collection("users").doc(user.uid).update({foto:url});
profilePic.src=url;
});
});
}

/* ================= ONLINE ================= */

function setOnline(val){
let user=auth.currentUser;
if(user){
db.collection("users").doc(user.uid).update({online:val});
}
}

window.onbeforeunload=()=>setOnline(false);

/* ================= PREVIEW ================= */

multiFile.onchange=()=>{
preview.innerHTML="";
selectedFiles=Array.from(multiFile.files);

selectedFiles.forEach(f=>{
let el;
if(f.type.startsWith("image")){
el=document.createElement("img");
}else{
el=document.createElement("video");
el.controls=true;
}
el.src=URL.createObjectURL(f);
preview.appendChild(el);
});
};

/* ================= SEND ================= */

async function sendChat(){

let docRef=await db.collection("chat").add({
nama:namaDisplay.innerText,
pesan:chatInput.value,
uid:auth.currentUser.uid,
waktu:new Date(),
read:false,
typing:false,
reply:replyData?replyData.pesan:null,
status:"sending",
files:selectedFiles.map(f=>({
type:f.type.startsWith("image")?"img":"video",
url:"",
progress:0,
uploading:true
}))
});

let id=docRef.id;

chatInput.value="";
preview.innerHTML="";
multiFile.value="";
replyData=null;

selectedFiles.forEach((file,i)=>{
uploadFile(file,docRef,id,i);
});

if(selectedFiles.length===0){
docRef.update({status:"sent"});
}

selectedFiles=[];
}

/* ================= UPLOAD ================= */

function uploadFile(file,docRef,id,index){

let ref=storage.ref("chat/"+Date.now()+file.name);
let task=ref.put(file);

if(!uploadTasks[id]) uploadTasks[id]={};
uploadTasks[id][index]=task;

task.on("state_changed",

snap=>{
let p=(snap.bytesTransferred/snap.totalBytes)*100;
docRef.get().then(d=>{
let f=d.data().files;
f[index].progress=Math.floor(p);
docRef.update({files:f});
});
},

()=>docRef.update({status:"failed"}),

()=>{
ref.getDownloadURL().then(url=>{
docRef.get().then(d=>{
let f=d.data().files;
f[index].url=url;
f[index].uploading=false;
docRef.update({files:f,status:"sent"});
});
});
}
);
}

function cancelUpload(id,i){
if(uploadTasks[id]&&uploadTasks[id][i]){
uploadTasks[id][i].cancel();
}
}

/* ================= TYPING ================= */

function typing(){
db.collection("typing").doc("global").set({
uid:auth.currentUser.uid
});

setTimeout(()=>{
db.collection("typing").doc("global").set({uid:""});
},1500);
}

db.collection("typing").doc("global")
.onSnapshot(doc=>{
let d=doc.data();
if(d.uid && d.uid!==auth.currentUser.uid){
typingStatus.innerText="Sedang mengetik...";
}else{
typingStatus.innerText="";
}
});

/* ================= CHAT ================= */

function loadChat(){
db.collection("chat").orderBy("waktu")
.onSnapshot(snap=>{
chatList.innerHTML="";

snap.forEach(doc=>{
let d=doc.data();
let div=document.createElement("div");

if(d.uid===auth.currentUser.uid) div.classList.add("me");

let status=d.status==="failed"?"❌":d.read?"✔✔":"✔";

let reply=d.reply?`<i>Reply: ${d.reply}</i><br>`:"";

div.innerHTML=`
<b>${d.nama}</b><br>
${reply}
${d.pesan}<br>${status}
`;

d.files?.forEach((f,i)=>{

if(f.type==="img"){
div.innerHTML+=`<br><img src="${f.url}" width="120">`;
}

if(f.type==="video"){
div.innerHTML+=`<br><video width="150" controls src="${f.url}"></video>`;
}

if(f.uploading){
div.innerHTML+=`<br>Uploading ${f.progress}%`;
let b=document.createElement("button");
b.textContent="Cancel";
b.onclick=()=>cancelUpload(doc.id,i);
div.appendChild(b);
}
});

let r=document.createElement("button");
r.textContent="Reply";
r.onclick=()=>{replyData=d;};

let f=document.createElement("button");
f.textContent="Forward";
f.onclick=()=>forwardChat(d);

div.appendChild(r);
div.appendChild(f);

chatList.appendChild(div);
});

chatList.scrollTop=chatList.scrollHeight;
});
}

/* ================= FORWARD ================= */

function forwardChat(d){
db.collection("chat").add({
nama:namaDisplay.innerText+" (Forward)",
pesan:d.pesan,
waktu:new Date()
});
}

/* ================= LOGOUT ================= */
function logout(){auth.signOut();}
</script>

</body>
</html>
