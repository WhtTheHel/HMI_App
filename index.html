<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>HMI Connect - V18 Reload Enabled</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --hmi-green: #084d1e; --hmi-gold: #d4af37; --bg: #f8fafc; }
        
        /* --- RELOAD ENABLED --- */
        html, body { 
            margin: 0; padding: 0; 
            min-height: 100%; 
            background: var(--bg);
            /* Menghapus overscroll-behavior agar Pull-to-Refresh AKTIF kembali */
            overscroll-behavior-y: auto; 
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }

        /* --- LOGIN SCREEN --- */
        #loginScreen { 
            position: fixed; inset: 0; z-index: 5000; 
            background: linear-gradient(rgba(5,51,20,0.92), rgba(5,51,20,0.85)), url('pngtree-hmi-organization-shield-logo-png-image_7307707.png');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .history-card { background: rgba(255, 255, 255, 0.12); border: 1px solid rgba(212, 175, 55, 0.4); backdrop-filter: blur(10px); border-radius: 20px; padding: 18px; color: white; max-width: 400px; margin-bottom: 20px; text-align: center; font-size: 11px; }
        .auth-card { background: white; padding: 30px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

        /* --- APP STRUCTURE --- */
        .topbar { position: sticky; top: 0; background: var(--hmi-green); color: white; display: flex; justify-content: space-between; align-items: center; height: 65px; padding: 0 20px; border-bottom: 3px solid var(--hmi-gold); z-index: 1000; }
        
        .view-content { 
            padding: 15px; 
            display: none; 
            min-height: calc(100vh - 65px);
        }
        .view-content.active { display: block; }

        /* --- SIDEBAR --- */
        #sidebar { position: fixed; left: -320px; top: 0; width: 300px; height: 100%; background: white; transition: 0.4s; z-index: 9999; padding: 25px; box-shadow: 15px 0 40px rgba(0,0,0,0.2); }
        #sidebar.active { left: 0; }
        .close-sidebar { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; color: #64748b; padding: 10px; font-weight: bold; }

        /* --- UI ELEMENTS --- */
        .btn-green { background: var(--hmi-green); color: white; border: none; padding: 14px; border-radius: 15px; font-weight: 800; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-google { background: white; border: 1px solid #dadce0; padding: 12px; border-radius: 15px; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 10px; font-weight: 700; color: #3c4043; }
        .post-card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 12px; border: 1px solid #edf2f7; position: relative; }
        .post-media { width: 100%; border-radius: 15px; margin-top: 10px; display: block; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #e2e8f0; background: #f8fafc; outline: none; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9000; }

        /* --- CHAT SYSTEM --- */
        #chatBox { height: 350px; overflow-y: auto; margin-bottom: 10px; border: 1px solid #eee; padding: 10px; border-radius: 15px; background: #fff; display: flex; flex-direction: column-reverse; }
        .chat-bubble { background: #f1f5f9; padding: 10px 15px; border-radius: 15px; margin-bottom: 8px; max-width: 85%; font-size: 13px; border-bottom-left-radius: 2px; }
        .chat-me { background: var(--hmi-green); color: white; align-self: flex-end; border-bottom-left-radius: 15px; border-bottom-right-radius: 2px; }
    </style>
</head>
<body>

<div id="overlay" onclick="window.toggleSidebar()"></div>

<div id="loginScreen">
    <div class="history-card">
        <img src="pngtree-hmi-organization-shield-logo-png-image_7307707.png" width="40">
        <h4 style="margin: 8px 0 0 0; color: var(--hmi-gold);">SEJARAH SINGKAT HMI</h4>
        <p>HMI didirikan di Yogyakarta pada 5 Februari 1947 oleh Lafran Pane sebagai wadah perjuangan mahasiswa islam.</p>
    </div>
    <div class="auth-card">
        <h2 style="color:var(--hmi-green); margin:0;">HMI CONNECT</h2>
        <input type="text" id="regNama" placeholder="Nama Lengkap" style="display:none;">
        <input type="text" id="identifier" placeholder="Email Kader">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-green" onclick="window.handleAuth()">MASUK</button>
        
        <button class="btn-google" onclick="window.handleGoogleLogin()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> Masuk dengan Google
        </button>
        <p onclick="window.toggleAuth()" id="authToggleText" style="font-size:12px; color:var(--hmi-green); cursor:pointer; margin-top:18px; font-weight:800; text-decoration:underline;">Daftar Akun Baru</p>
    </div>
</div>

<div id="app" style="display:none;">
    <div class="topbar">
        <div onclick="window.toggleSidebar()" style="cursor:pointer; font-size:24px;">☰</div>
        <b id="viewTitle">BERANDA</b>
        <img id="userTopPhoto" src="" style="width:38px; height:38px; border-radius:50%; border:2px solid var(--hmi-gold); cursor:pointer;" onclick="window.openModal('profileModal')">
    </div>

    <div id="sidebar">
        <div class="close-sidebar" onclick="window.toggleSidebar()">✕</div>
        <div style="text-align:center; padding-bottom:15px; border-bottom:1px solid #eee;">
            <img src="pngtree-hmi-organization-shield-logo-png-image_7307707.png" width="45">
            <h4 id="userNameSidebar">Memuat...</h4>
            <div id="roleBadgeSidebar" style="background:var(--hmi-gold); color:white; font-size:9px; padding:2px 10px; border-radius:10px; display:inline-block;">MEMUAT...</div>
        </div>
        <nav style="margin-top:20px;">
            <div style="padding:15px; cursor:pointer; font-weight:800;" onclick="window.showView('homeView', 'BERANDA')">🏠 Beranda</div>
            <div style="padding:15px; cursor:pointer; font-weight:800;" onclick="window.showView('groupView', 'GRUP DISKUSI')">👥 Grup Diskusi</div>
            <div id="adminMenu" style="display:none; padding:15px; cursor:pointer; font-weight:800; color:var(--hmi-gold);" onclick="window.showView('memberView', 'PANEL OWNER')">🛡️ Panel Owner</div>
            <div style="padding:15px; cursor:pointer; font-weight:800; color:red; margin-top:40px;" onclick="window.logout()">🚪 Keluar</div>
        </nav>
    </div>

    <div id="homeView" class="view-content active">
        <div class="post-card" style="border: 2px solid var(--hmi-green);">
            <textarea id="postText" placeholder="Ketik sesuatu..."></textarea>
            <input type="file" id="homeFile" accept="image/*" style="display:none;" onchange="window.handleFile(this)">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <button onclick="document.getElementById('homeFile').click()" style="background:#f1f5f9; border:none; color:var(--hmi-green); font-weight:800; padding:10px; border-radius:10px; cursor:pointer;">🖼️ Foto</button>
                <button class="btn-green" style="width:auto; padding:10px 30px; margin:0;" onclick="window.submitPost()">KIRIM</button>
            </div>
            <div id="previewBox" style="display:none; margin-top:10px;"><img id="imgPreview" class="post-media"></div>
        </div>
        <div id="feedContainer"></div>
    </div>

    <div id="groupView" class="view-content">
        <div id="chatBox"></div>
        <div style="display:flex; gap:5px; margin-top:10px; position: sticky; bottom: 10px;">
            <input type="text" id="chatInput" placeholder="Ketik pesan grup...">
            <button class="btn-green" style="width:auto; margin:0;" onclick="window.sendChat()">KIRIM</button>
        </div>
    </div>

    <div id="memberView" class="view-content">
        <h3>Data Kader</h3>
        <div id="memberList"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile, GoogleAuthProvider, signInWithPopup } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
    import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, orderBy, deleteDoc, limit } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

    const firebaseConfig = { apiKey: "AIzaSyA_SW13O3EPp6L6TGT3UV5B2ADzwCV_Owo", authDomain: "hmi-app-ac76d.firebaseapp.com", projectId: "hmi-app-ac76d" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let userRole = "anggota";
    let tempMedia = "";

    window.toggleSidebar = () => {
        const side = document.getElementById('sidebar');
        const over = document.getElementById('overlay');
        const isActive = side.classList.toggle('active');
        over.style.display = isActive ? 'block' : 'none';
    };

    window.showView = (id, title) => {
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('viewTitle').innerText = title;
        window.toggleSidebar();
        if(id === 'groupView') loadChats();
    };

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            let uDoc = await getDoc(doc(db, "users", user.uid));
            if(!uDoc.exists()) {
                await setDoc(doc(db, "users", user.uid), { nama: user.displayName || "Kader", email: user.email, role: "anggota" });
                uDoc = await getDoc(doc(db, "users", user.uid));
            }
            const data = uDoc.data();
            userRole = (data.role || "anggota").toLowerCase();
            
            document.getElementById('userNameSidebar').innerText = data.nama;
            document.getElementById('roleBadgeSidebar').innerText = userRole.toUpperCase();
            document.getElementById('userTopPhoto').src = user.photoURL || `https://ui-avatars.com/api/?name=${data.nama}&background=084d1e&color=fff`;
            document.getElementById('adminMenu').style.display = (userRole === 'owner' || userRole === 'admin') ? 'block' : 'none';
            
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            loadFeed();
        } else {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
        }
    });

    window.sendChat = async () => {
        const msg = document.getElementById('chatInput').value;
        if(!msg) return;
        await addDoc(collection(db, "chats"), {
            uid: auth.currentUser.uid,
            nama: auth.currentUser.displayName || "Kader",
            text: msg,
            time: Date.now()
        });
        document.getElementById('chatInput').value = "";
    };

    function loadChats() {
        onSnapshot(query(collection(db, "chats"), orderBy("time", "desc"), limit(50)), (snap) => {
            const box = document.getElementById('chatBox');
            box.innerHTML = "";
            snap.forEach(d => {
                const c = d.data();
                const isMe = c.uid === auth.currentUser.uid;
                box.innerHTML += `<div class="chat-bubble ${isMe ? 'chat-me' : ''}"><b>${c.nama}</b><br>${c.text}</div>`;
            });
        });
    }

    window.handleFile = (input) => {
        const reader = new FileReader();
        reader.onload = () => {
            tempMedia = reader.result;
            document.getElementById('imgPreview').src = tempMedia;
            document.getElementById('previewBox').style.display = 'block';
        };
        if(input.files[0]) reader.readAsDataURL(input.files[0]);
    };

    window.submitPost = async () => {
        const txt = document.getElementById('postText').value;
        if(!txt && !tempMedia) return;
        await addDoc(collection(db, "posts"), { 
            uid: auth.currentUser.uid, 
            userName: auth.currentUser.displayName || "Kader", 
            content: txt, 
            media: tempMedia, 
            time: Date.now() 
        });
        document.getElementById('postText').value = "";
        document.getElementById('previewBox').style.display = 'none';
        tempMedia = "";
    };

    function loadFeed() {
        onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), (snap) => {
            const container = document.getElementById('feedContainer');
            container.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                const canDel = p.uid === auth.currentUser.uid || userRole === 'owner';
                container.innerHTML += `
                    <div class="post-card">
                        ${canDel ? `<span onclick="window.deletePost('${d.id}')" style="float:right; color:red; font-size:10px; cursor:pointer; font-weight:800;">HAPUS</span>` : ''}
                        <b style="color:var(--hmi-green)">${p.userName}</b>
                        <p style="margin-top:10px;">${p.content}</p>
                        ${p.media ? `<img src="${p.media}" class="post-media">` : ''}
                    </div>`;
            });
        });
    }

    window.deletePost = async (id) => { if(confirm("Hapus?")) await deleteDoc(doc(db, "posts", id)); };
    window.handleGoogleLogin = async () => { try { await signInWithPopup(auth, provider); } catch(e) { alert(e.message); } };
    window.logout = () => signOut(auth);
    window.toggleAuth = () => {
        const isL = document.getElementById('regNama').style.display === "none";
        document.getElementById('regNama').style.display = isL ? 'block' : 'none';
        document.getElementById('authToggleText').innerText = isL ? "Sudah punya akun? Masuk" : "Belum punya akun? Daftar";
    };
</script>
</body>
    </html>
