<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>HMI Connect - V32 Professional</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --hmi-green: #084d1e; --hmi-gold: #d4af37; --bg: #f8fafc; }
        body { margin: 0; background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* UI ELEMENTS */
        .topbar { position: sticky; top: 0; background: var(--hmi-green); color: white; display: flex; justify-content: space-between; align-items: center; height: 65px; padding: 0 20px; border-bottom: 3px solid var(--hmi-gold); z-index: 1000; }
        .view-content { padding: 15px; display: none; min-height: 100vh; padding-bottom: 120px; }
        .view-content.active { display: block; }

        /* CARDS */
        .card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid #edf2f7; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .avatar-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--hmi-gold); background: #eee; }
        .media-box { width: 100%; border-radius: 12px; margin-top: 10px; display: block; border: 1px solid #eee; }

        /* MODALS */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 20000; align-items: center; justify-content: center; padding: 20px; }
        .modal-body { background: white; padding: 25px; border-radius: 25px; width: 100%; max-width: 450px; text-align: center; }

        /* BUTTONS */
        .btn-hmi { background: var(--hmi-green); color: white; border: none; padding: 14px; border-radius: 15px; font-weight: 800; width: 100%; cursor: pointer; }
        .btn-hmi:disabled { background: #ccc; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #ddd; outline: none; }

        /* SIDEBAR */
        #sidebar { position: fixed; left: -320px; top: 0; width: 280px; height: 100%; background: white; transition: 0.3s; z-index: 9999; padding: 25px; }
        #sidebar.active { left: 0; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9000; }
    </style>
</head>
<body>

<div id="overlay"></div>

<div id="historyModal" class="modal">
    <div class="modal-body">
        <img src="pngtree-hmi-organization-shield-logo-png-image_7307707.png" width="50">
        <h2 style="color:var(--hmi-green)">Sejarah HMI</h2>
        <p style="text-align:justify; font-size:13px;">HMI didirikan 5 Februari 1947 oleh Ayahanda Lafran Pane untuk mewujudkan insan akademis, pencipta, pengabdi yang bernafaskan Islam.</p>
        <button class="btn-hmi" id="closeHistBtn">SAYA MENGERTI</button>
    </div>
</div>

<div id="profileModal" class="modal">
    <div class="modal-body">
        <h3>Edit Profil Kader</h3>
        <input type="file" id="upAvatar" accept="image/*" style="display:none;">
        <img id="viewAvatar" src="" style="width:100px; height:100px; border-radius:50%; object-fit:cover; border:3px solid var(--hmi-gold); cursor:pointer;" onclick="document.getElementById('upAvatar').click()">
        <p style="font-size:10px; color:gray;">Klik foto untuk ganti dari Galeri</p>
        <input type="text" id="upNama" placeholder="Nama Lengkap">
        <input type="password" id="upPass" placeholder="Password Baru (Kosongkan jika tidak ganti)">
        <button class="btn-hmi" id="saveProfileBtn">SIMPAN PERUBAHAN</button>
        <button onclick="document.getElementById('profileModal').style.display='none'" style="border:none; background:none; color:red; margin-top:15px; font-weight:bold;">BATAL</button>
    </div>
</div>

<div id="app">
    <div class="topbar">
        <div id="openMenu" style="font-size:24px; cursor:pointer;">☰</div>
        <div style="display:flex; align-items:center; gap:8px;">
            <img src="pngtree-hmi-organization-shield-logo-png-image_7307707.png" width="30">
            <b id="vTitle">BERANDA</b>
        </div>
        <img id="navAva" style="width:38px; height:38px; border-radius:50%; border:2px solid var(--hmi-gold); cursor:pointer; object-fit:cover;">
    </div>

    <div id="sidebar">
        <div style="text-align:center; padding-bottom:20px; border-bottom:1px solid #eee;">
            <img id="sideAva" style="width:80px; height:80px; border-radius:50%; border:3px solid var(--hmi-gold); object-fit:cover; margin-bottom:10px;">
            <h4 id="sideName" style="margin:0;">Memuat Nama...</h4>
        </div>
        <div style="margin-top:20px;">
            <div style="padding:15px; font-weight:700; cursor:pointer;" onclick="location.reload()">🏠 Beranda</div>
            <div style="padding:15px; font-weight:700; cursor:pointer;" id="toGroup">👥 Grup Diskusi</div>
            <div style="padding:15px; font-weight:700; cursor:pointer; color:var(--hmi-green);" id="toHist">📖 Sejarah HMI</div>
            <div style="padding:15px; font-weight:700; cursor:pointer; color:red; margin-top:30px;" id="btnLogout">🚪 Keluar</div>
        </div>
    </div>

    <div id="homeView" class="view-content active">
        <div class="card" style="border: 2px solid var(--hmi-green);">
            <textarea id="pInput" placeholder="Apa kabar perjuangan hari ini?"></textarea>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <label for="pFile" style="background:#f1f5f9; padding:10px 15px; border-radius:10px; font-weight:bold; font-size:12px; cursor:pointer;">🖼️ Galeri</label>
                <input type="file" id="pFile" accept="image/*,video/*" style="display:none;">
                <button class="btn-hmi" id="sendPostBtn" style="width:auto; padding:10px 25px;">POSTING</button>
            </div>
            <div id="pPreview" style="display:none; color:green; font-size:11px; margin-top:8px; font-weight:bold;">✅ Media siap diunggah!</div>
        </div>
        <div id="feed"></div>
    </div>

    <div id="groupView" class="view-content">
        <div id="chatBox" class="card" style="height:65vh; overflow-y:auto; display:flex; flex-direction:column; gap:10px; background:#fafafa;"></div>
        <div style="display:flex; gap:8px; background:white; padding:10px; border-radius:20px; border:1px solid #ddd;">
            <label for="cFile" style="font-size:22px; cursor:pointer;">📎</label>
            <input type="file" id="cFile" accept="image/*,video/*" style="display:none;">
            <input type="text" id="cInput" placeholder="Ketik pesan..." style="border:none; margin:0; flex:1;">
            <button id="sendChatBtn" class="btn-hmi" style="width:auto; padding:8px 20px;">KIRIM</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut, updateProfile, updatePassword } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
    import { getFirestore, doc, onSnapshot, collection, query, orderBy, addDoc, deleteDoc, updateDoc, arrayUnion, arrayRemove } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

    const firebaseConfig = { apiKey: "AIzaSyA_SW13O3EPp6L6TGT3UV5B2ADzwCV_Owo", authDomain: "hmi-app-ac76d.firebaseapp.com", projectId: "hmi-app-ac76d" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let tempMediaPost = "", tempMediaChat = "", tempAvatar = "";

    // --- UTILS ---
    const toggleSidebar = () => {
        const active = document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').style.display = active ? 'block' : 'none';
    };

    // --- AUTH & DATA SYNC ---
    onAuthStateChanged(auth, (user) => {
        if(user) {
            if(!localStorage.getItem('hmi_viewed')) document.getElementById('historyModal').style.display = 'flex';
            
            onSnapshot(doc(db, "users", user.uid), (s) => {
                if(s.exists()){
                    const d = s.data();
                    const name = d.nama || user.displayName || "Kader HMI";
                    const ava = d.photoURL || `https://ui-avatars.com/api/?name=${name}&background=084d1e&color=fff`;
                    document.getElementById('sideName').innerText = name;
                    document.getElementById('navAva').src = document.getElementById('sideAva').src = document.getElementById('viewAvatar').src = ava;
                    document.getElementById('upNama').value = name;
                }
            });
            loadFeed();
        }
    });

    // --- POSTING LOGIC ---
    document.getElementById('pFile').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = () => { tempMediaPost = reader.result; document.getElementById('pPreview').style.display = 'block'; };
        reader.readAsDataURL(e.target.files[0]);
    };

    document.getElementById('sendPostBtn').onclick = async () => {
        const btn = document.getElementById('sendPostBtn');
        const txt = document.getElementById('pInput').value;
        if(!txt && !tempMediaPost) return;

        btn.disabled = true; btn.innerText = "Mengirim...";
        try {
            await addDoc(collection(db, "posts"), {
                uid: auth.currentUser.uid, name: document.getElementById('sideName').innerText,
                ava: document.getElementById('sideAva').src, text: txt, media: tempMediaPost,
                likes: [], time: Date.now()
            });
            document.getElementById('pInput').value = ""; tempMediaPost = "";
            document.getElementById('pPreview').style.display = 'none';
        } catch(e) { alert("Gagal posting: " + e.message); }
        btn.disabled = false; btn.innerText = "POSTING";
    };

    // --- CHAT LOGIC ---
    document.getElementById('cFile').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = () => { tempMediaChat = reader.result; alert("Gambar siap dikirim!"); };
        reader.readAsDataURL(e.target.files[0]);
    };

    document.getElementById('sendChatBtn').onclick = async () => {
        const txt = document.getElementById('cInput').value;
        if(!txt && !tempMediaChat) return;
        await addDoc(collection(db, "chats"), {
            uid: auth.currentUser.uid, name: document.getElementById('sideName').innerText,
            text: txt, media: tempMediaChat, time: Date.now()
        });
        document.getElementById('cInput').value = ""; tempMediaChat = "";
    };

    // --- PROFILE SAVE FIX ---
    document.getElementById('upAvatar').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = () => { tempAvatar = reader.result; document.getElementById('viewAvatar').src = reader.result; };
        reader.readAsDataURL(e.target.files[0]);
    };

    document.getElementById('saveProfileBtn').onclick = async () => {
        const btn = document.getElementById('saveProfileBtn');
        const newName = document.getElementById('upNama').value;
        const newPass = document.getElementById('upPass').value;
        
        btn.disabled = true; btn.innerText = "Menyimpan...";
        try {
            const upData = { nama: newName };
            if(tempAvatar) upData.photoURL = tempAvatar;
            
            await updateDoc(doc(db, "users", auth.currentUser.uid), upData);
            await updateProfile(auth.currentUser, { displayName: newName, photoURL: tempAvatar || auth.currentUser.photoURL });
            
            if(newPass) await updatePassword(auth.currentUser, newPass);
            
            alert("Profil Berhasil Diperbarui!");
            document.getElementById('profileModal').style.display = 'none';
        } catch(e) { alert("Error: " + e.message); }
        btn.disabled = false; btn.innerText = "SIMPAN PERUBAHAN";
    };

    // --- FEED RENDERER ---
    function loadFeed() {
        onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), (sn) => {
            const f = document.getElementById('feed'); f.innerHTML = "";
            sn.forEach(d => {
                const p = d.data(); const isL = p.likes?.includes(auth.currentUser.uid);
                f.innerHTML += `
                    <div class="card">
                        <div style="display:flex; gap:10px; align-items:center; margin-bottom:10px;">
                            <img src="${p.ava}" class="avatar-img">
                            <b>${p.name}</b>
                            ${p.uid === auth.currentUser.uid ? `<b onclick="window.delP('${d.id}')" style="margin-left:auto; color:red; cursor:pointer;">✕</b>` : ''}
                        </div>
                        <p>${p.text}</p>
                        ${p.media ? `<img src="${p.media}" class="media-box">` : ''}
                        <div style="display:flex; gap:20px; margin-top:10px; border-top:1px solid #eee; padding-top:10px;">
                            <span onclick="window.like('${d.id}', ${JSON.stringify(p.likes)})" style="cursor:pointer; font-weight:800; color:${isL?'red':'gray'}">❤️ ${p.likes?.length || 0}</span>
                            <span onclick="window.share('${p.name}','${p.text}')" style="cursor:pointer; font-weight:800; color:var(--hmi-green)">🔗 Share WA</span>
                        </div>
                    </div>`;
            });
        });
    }

    function loadChat() {
        onSnapshot(query(collection(db, "chats"), orderBy("time", "asc")), (sn) => {
            const b = document.getElementById('chatBox'); b.innerHTML = "";
            sn.forEach(d => {
                const c = d.data(); const isMe = c.uid === auth.currentUser.uid;
                b.innerHTML += `<div style="max-width:85%; padding:12px; border-radius:15px; align-self:${isMe?'flex-end':'flex-start'}; background:${isMe?'var(--hmi-green)':'#eee'}; color:${isMe?'white':'black'};">
                    <small><b>${isMe?'Anda':c.name}</b></small><br>${c.text||''}${c.media?`<img src="${c.media}" class="media-box">`:''}
                </div>`;
            });
            b.scrollTop = b.scrollHeight;
        });
    }

    // --- GLOBAL BINDING ---
    window.delP = async (id) => { if(confirm("Hapus postingan?")) await deleteDoc(doc(db,"posts",id)); };
    window.like = async (id, lks) => { const u = auth.currentUser.uid; await updateDoc(doc(db,"posts",id), { likes: lks.includes(u)?arrayRemove(u):arrayUnion(u) }); };
    window.share = (n, t) => { window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent("*HMI CONNECT*\nKader: "+n+"\nIsi: "+t)}`); };

    document.getElementById('openMenu').onclick = toggleSidebar;
    document.getElementById('overlay').onclick = toggleSidebar;
    document.getElementById('closeHistBtn').onclick = () => { document.getElementById('historyModal').style.display = 'none'; localStorage.setItem('hmi_viewed', 'true'); };
    document.getElementById('navAva').onclick = () => document.getElementById('profileModal').style.display = 'flex';
    document.getElementById('toHist').onclick = () => { document.getElementById('historyModal').style.display = 'flex'; toggleSidebar(); };
    document.getElementById('toGroup').onclick = () => { 
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        document.getElementById('groupView').classList.add('active');
        document.getElementById('vTitle').innerText = "GRUP DISKUSI";
        toggleSidebar(); loadChat();
    };
    document.getElementById('btnLogout').onclick = () => { if(confirm("Keluar?")) signOut(auth).then(()=>location.reload()); };
</script>
</body>
    </html>
