<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>HMI Super App - Pusat Koordinasi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        /* --- CSS STYLE --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0b6623 0%, #1a5f2e 50%, #111 100%);
            color: white;
            min-height: 100vh;
        }

        .login-container {
            max-width: 400px; margin: 40px auto; background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px); border-radius: 25px; padding: 30px; text-align: center;
        }

        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: none; font-size: 16px; }
        button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        
        .btn-main { background: #0b6623; color: white; }
        .btn-outline { background: transparent; border: 1px solid white; color: white; text-decoration: none; display: block; }

        #app { display: none; }
        .topbar { background: #0b6623; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }

        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: #111; transition: 0.3s; z-index: 2001; padding: 20px;
        }
        .sidebar.active { left: 0; }
        .overlay { position: fixed; display: none; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; }
        .overlay.active { display: block; }

        .card { background: white; color: #333; margin: 15px; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* Chat Styles */
        #messagesContainer { height: 300px; overflow-y: auto; background: #f4f4f4; border-radius: 10px; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 14px; }
        .msg-me { align-self: flex-end; background: #0b6623; color: white; }
        .msg-them { align-self: flex-start; background: #ddd; color: black; }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: black; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; z-index: 3000; }
    </style>
</head>
<body>

<div id="overlay" class="overlay"></div>

<div id="loginScreen">
    <div class="login-container">
        <h2>HMI SUPER APP</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-main" onclick="handleLogin()">🚀 Masuk</button>
        <button class="btn-outline" onclick="handleGoogleLogin()">🔗 Login Google</button>
    </div>
</div>

<div id="app">
    <div class="topbar">
        <div id="burgerBtn" style="cursor:pointer; font-size:24px;">☰</div>
        <b>HMI SUPER APP</b>
        <div id="adminBadge" style="display:none; background:#f1c40f; color:black; padding:2px 8px; border-radius:5px; font-size:10px;">ROLE</div>
    </div>

    <div id="sidebar" class="sidebar">
        <h3 style="color:#f1c40f;">Menu</h3>
        <p id="userNameDisplay" style="color:#90EE90; font-weight:bold;">Memuat...</p>
        <button class="btn-outline" onclick="closeAll()">🏠 Beranda</button>
        
        <div id="adminMenuSection" style="display:none; border-top:1px solid #333; margin-top:10px; padding-top:10px;">
            <button class="btn-outline" onclick="openModal('groupModal')">➕ Buat Grup Baru</button>
        </div>
        
        <button class="btn-outline" onclick="logout()" style="margin-top:20px; color:#ff4d4d; border-color:#ff4d4d;">🚪 Keluar</button>
    </div>

    <div id="groupListView" class="card">
        <h4 style="color:#0b6623; margin-top:0;">📂 Daftar Grup & Komisariat</h4>
        <div id="groupContainer">Memuat grup...</div>
    </div>

    <div id="chatView" class="card" style="display:none; flex-direction:column;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h4 id="chatGroupName" style="margin:0;">Nama Grup</h4>
            <button onclick="backToGroups()" style="background:#eee; border:none; padding:5px; border-radius:5px;">❌ Tutup</button>
        </div>
        <div id="messagesContainer"></div>
        <div style="display:flex; gap:5px; margin-top:10px;">
            <input type="text" id="chatInput" placeholder="Tulis pesan..." style="flex:1; margin:0;">
            <button class="btn-main" onclick="sendMessage()" style="width:70px; margin:0;">Kirim</button>
        </div>
    </div>

    <div id="adminPanel" class="card" style="display:none;">
        <h4 style="color:#0b6623;">👥 Kelola Anggota</h4>
        <div id="userList"></div>
    </div>
</div>

<div id="groupModal" class="modal">
    <h4>Buat Grup Baru</h4>
    <input type="text" id="newGroupName" placeholder="Nama Komisariat">
    <button class="btn-main" onclick="submitGroup()">Simpan</button>
    <button class="btn-outline" style="color:#666; border-color:#ccc;" onclick="closeAll()">Batal</button>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
    import { getFirestore, doc, collection, onSnapshot, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

    const firebaseConfig = {
        apiKey: "AIzaSyA_SW13O3EPp6L6TGT3UV5B2ADzwCV_Owo",
        authDomain: "hmi-app-ac76d.firebaseapp.com",
        projectId: "hmi-app-ac76d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentGroupId = null;
    let chatListener = null;

    // --- AUTH ---
    window.handleLogin = async () => {
        try {
            await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
        } catch (e) { alert("Login Gagal"); }
    };

    window.handleGoogleLogin = async () => {
        try { await signInWithPopup(auth, new GoogleAuthProvider()); } catch (e) { alert("Google Gagal"); }
    };

    window.logout = () => signOut(auth);

    // --- MONITOR USER & ROLE ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('app').style.display = 'block';

            onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('userNameDisplay').innerText = data.nama || data.email;
                    
                    const role = (data.role || data.Role || "anggota").toLowerCase().trim();
                    const isOwner = role === "owner";
                    const isAdmin = role === "admin";

                    document.getElementById('adminMenuSection').style.display = (isOwner || isAdmin) ? 'block' : 'none';
                    document.getElementById('adminBadge').style.display = (isOwner || isAdmin) ? 'block' : 'none';
                    document.getElementById('adminBadge').innerText = role.toUpperCase();
                    
                    if(isOwner) {
                        document.getElementById('adminPanel').style.display = 'block';
                        loadUserManagement();
                    }
                }
            });
            loadGroupList();
        } else {
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('app').style.display = 'none';
        }
    });

    // --- GRUP & CHAT ---
    function loadGroupList() {
        onSnapshot(collection(db, "groups"), (snap) => {
            const container = document.getElementById('groupContainer');
            container.innerHTML = "";
            snap.forEach(g => {
                const div = document.createElement('div');
                div.style = "padding:12px; border:1px solid #eee; border-radius:10px; margin-bottom:8px; cursor:pointer; color:black;";
                div.innerHTML = `<b>📂 ${g.data().namaGrup}</b><br><small>Klik untuk chat</small>`;
                div.onclick = () => openChat(g.id, g.data().namaGrup);
                container.appendChild(div);
            });
        });
    }

    window.openChat = (id, name) => {
        currentGroupId = id;
        document.getElementById('groupListView').style.display = 'none';
        document.getElementById('chatView').style.display = 'flex';
        document.getElementById('chatGroupName').innerText = name;
        loadMessages(id);
    };

    window.backToGroups = () => {
        document.getElementById('groupListView').style.display = 'block';
        document.getElementById('chatView').style.display = 'none';
        if(chatListener) chatListener();
    };

    function loadMessages(id) {
        const container = document.getElementById('messagesContainer');
        chatListener = onSnapshot(collection(db, "groups", id, "messages"), (snap) => {
            container.innerHTML = "";
            const sorted = snap.docs.sort((a,b) => (a.data().time || 0) - (b.data().time || 0));
            sorted.forEach(m => {
                const d = m.data();
                const isMe = d.senderId === auth.currentUser.uid;
                const div = document.createElement('div');
                div.className = `msg ${isMe ? 'msg-me' : 'msg-them'}`;
                div.innerHTML = `<small style="font-size:9px; display:block;">${d.senderName}</small>${d.text}`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        });
    }

    window.sendMessage = async () => {
        const input = document.getElementById('chatInput');
        if(!input.value || !currentGroupId) return;
        await addDoc(collection(db, "groups", currentGroupId, "messages"), {
            text: input.value,
            senderId: auth.currentUser.uid,
            senderName: document.getElementById('userNameDisplay').innerText,
            time: Date.now()
        });
        input.value = "";
    };

    window.submitGroup = async () => {
        const name = document.getElementById('newGroupName').value;
        if(!name) return;
        await addDoc(collection(db, "groups"), { namaGrup: name, createdAt: serverTimestamp() });
        closeAll();
    };

    function loadUserManagement() {
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('userList');
            list.innerHTML = "";
            snap.forEach(u => {
                const div = document.createElement('div');
                div.style = "padding:5px; border-bottom:1px solid #eee; font-size:12px;";
                div.innerHTML = `${u.data().nama} - <b>${u.data().role}</b>`;
                list.appendChild(div);
            });
        });
    }

    // --- UI HELPERS ---
    window.closeAll = () => {
        document.getElementById('sidebar').classList.remove('active');
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('groupModal').style.display = 'none';
    };
    window.openModal = (id) => { document.getElementById(id).style.display = 'block'; };
    document.getElementById('burgerBtn').onclick = () => {
        document.getElementById('sidebar').classList.add('active');
        document.getElementById('overlay').style.display = 'block';
    };
    document.getElementById('overlay').onclick = closeAll;
</script>
</body>
</html>
