<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>HMI Connect - V64 Absolute Restoration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --hmi-green: #084d1e; --hmi-black: #1a1a1a; --hmi-gold: #d4af37; --bg: #f0f2f5; }
        body { margin: 0; background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--hmi-black); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* HEADER */
        .topbar { position: sticky; top: 0; background: var(--hmi-green); color: white; display: flex; justify-content: space-between; align-items: center; height: 65px; padding: 0 20px; border-bottom: 4px solid var(--hmi-black); z-index: 9999; }
        .nav-ava { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--hmi-gold); object-fit: cover; cursor: pointer; }
        
        /* SIDEBAR */
        #sidebar { position: fixed; left: -300px; top: 0; width: 280px; height: 100%; background: white; transition: 0.3s; z-index: 10001; padding: 25px; box-shadow: 10px 0 30px rgba(0,0,0,0.1); overflow-y: auto; }
        #sidebar.active { left: 0; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 10000; backdrop-filter: blur(2px); }

        /* ELEMENTS */
        .card { background: white; border-radius: 18px; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; position: relative; }
        .btn-hmi { background: var(--hmi-green); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-mini { border: none; padding: 8px 12px; border-radius: 8px; font-size: 11px; font-weight: 800; cursor: pointer; background: #eee; }
        
        .action-dots { font-size: 28px; color: var(--hmi-green); cursor: pointer; padding: 0 10px; font-weight: bold; line-height: 1; }
        
        .view-content { display: none; padding: 15px; padding-bottom: 100px; }
        .view-content.active { display: block; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1.5px solid #eee; outline: none; font-family: inherit; }

        /* BADGES */
        .pos-label { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-top: 4px; text-transform: uppercase; }
        .label-kader { color: var(--hmi-green); background: #e8f5e9; }
        .label-admin { color: white; background: #007bff; }
        .label-owner { color: #000; background: var(--hmi-gold); border: 1px solid #b3922d; }

        .menu-item { padding: 12px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 10px; border-radius: 8px; color: var(--hmi-black); text-decoration: none; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 20000; align-items: center; justify-content: center; padding: 20px; }
        .modal-body { background: white; padding: 25px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; }
        
        .post-media { width: 100%; border-radius: 12px; margin-top: 10px; max-height: 400px; object-fit: contain; background: #000; }
        
        .tab-bar { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 2px solid #eee; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; font-weight: 800; color: gray; cursor: pointer; }
        .tab-btn.active { color: var(--hmi-green); border-bottom: 3px solid var(--hmi-green); }
    </style>
</head>
<body>

<div id="authLayer" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 25px;">
    <div style="text-align:center; width:100%; max-width:360px;">
        <img src="https://upload.wikimedia.org/wikipedia/id/0/00/Lambang_Himpunan_Mahasiswa_Islam.png" width="75">
        <h2 style="color:var(--hmi-green)">HMI CONNECT</h2>
        <div id="loginBox">
            <input type="email" id="logEmail" placeholder="Email">
            <input type="password" id="logPass" placeholder="Password">
            <button class="btn-hmi" id="btnSignIn">MASUK</button>
            <p style="font-size:13px; margin-top:20px;">Belum punya akun? <b onclick="toggleAuth(false)" style="color:var(--hmi-green); cursor:pointer;">Daftar</b></p>
        </div>
        <div id="regBox" style="display:none;">
            <input type="text" id="regName" placeholder="Nama Lengkap">
            <input type="email" id="regEmail" placeholder="Email Aktif">
            <input type="password" id="regPass" placeholder="Password">
            <button class="btn-hmi" id="btnSignUp">DAFTAR KADER</button>
            <p style="font-size:13px; margin-top:20px;"><b onclick="toggleAuth(true)" style="color:var(--hmi-green); cursor:pointer;">Kembali</b></p>
        </div>
    </div>
</div>

<div id="appLayer" style="display:none;">
    <div id="overlay" onclick="toggleSidebar()"></div>
    <div class="topbar">
        <div style="font-size:28px; cursor:pointer;" onclick="toggleSidebar()">☰</div>
        <b id="pageTitle">BERANDA</b>
        <img id="navAva" class="nav-ava">
    </div>

    <div id="sidebar">
        <div style="text-align:center; padding-bottom:15px; border-bottom:2px solid #eee;">
            <img id="sideAva" style="width:65px; height:65px; border-radius:50%; border:3px solid var(--hmi-green); object-fit:cover;">
            <h4 id="sideName" style="margin:8px 0 0 0;">...</h4>
            <div id="roleBadge"></div>
        </div>
        <div style="margin-top:15px;">
            <div class="menu-item" onclick="changeView('homeView', 'BERANDA')">🏠 Beranda</div>
            <div class="menu-item" onclick="changeView('memberGlobalView', 'DAFTAR ANGGOTA')">👥 Daftar Anggota</div>
            <div class="menu-item" onclick="changeView('cabangView', 'DAFTAR CABANG')">🏢 Cabang</div>
            <div class="menu-item" onclick="changeView('komisariatMainView', 'KOMISARIAT')">🏛️ Komisariat</div>
            <div class="menu-item" onclick="changeView('groupView', 'DISKUSI UMUM')">💬 Diskusi Umum</div>
            <div id="adminMenu" style="display:none;" class="menu-item" onclick="changeView('adminPanel', 'PERSETUJUAN')">🛡️ Persetujuan</div>
            <div class="menu-item" style="color:red; margin-top:25px;" onclick="doLogout()">🚪 Keluar</div>
        </div>
    </div>

    <div id="homeView" class="view-content active">
        <div class="card" style="border-left: 5px solid var(--hmi-green);">
            <textarea id="pInput" placeholder="Posting hari ini..."></textarea>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <label for="pFile" style="background:#eee; padding:8px 12px; border-radius:8px; font-size:12px; cursor:pointer;">📷 Media</label>
                <input type="file" id="pFile" accept="image/*,video/*" style="display:none;">
                <button class="btn-hmi" id="btnPost" style="width:auto; padding:8px 20px; margin:0;">POSTING</button>
            </div>
            <div id="mediaPreview" style="display:none; margin-top:10px; font-size:11px; color:var(--hmi-green); font-weight:800;">✅ Media Siap</div>
        </div>
        <div id="feed"></div>
    </div>

    <div id="memberGlobalView" class="view-content">
        <h3>Database Seluruh Kader</h3>
        <input type="text" id="searchMem" placeholder="Cari nama kader..." oninput="loadGlobalMembers(this.value)">
        <div id="listGlobalMembers"></div>
    </div>

    <div id="unitDetailView" class="view-content">
        <button class="btn-mini" onclick="history.back()" style="background:#ddd; padding:10px;">⬅️ Kembali</button>
        <h2 id="detailUnitTitle" style="color:var(--hmi-green); margin:15px 0 5px 0;"></h2>
        <div class="tab-bar">
            <button id="tabMem" class="tab-btn active" onclick="switchUnitTab('members')">ANGGOTA</button>
            <button id="tabChat" class="tab-btn" onclick="switchUnitTab('chat')">CHAT</button>
        </div>
        <div id="unitMembers"><div id="listMemberUnit"></div></div>
        <div id="unitChat" style="display:none;">
            <div id="unitChatBox" style="height:45vh; overflow-y:auto; padding:10px; background:#fff; border-radius:12px; border:1px solid #eee; display:flex; flex-direction:column; gap:8px;"></div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <input type="text" id="unitChatInput" placeholder="Pesan..." style="margin:0;">
                <button class="btn-hmi" onclick="sendUnitChat()" style="width:auto; margin:0;">KIRIM</button>
            </div>
        </div>
    </div>

    <div id="adminPanel" class="view-content">
        <h3>Persetujuan Kader Baru</h3>
        <div id="listPendingUsers"></div>
    </div>

    <div id="cabangView" class="view-content">
        <div id="adminCabangControls" style="display:none;" class="card">
            <input type="text" id="newCabangName" placeholder="Nama Cabang">
            <button class="btn-hmi" onclick="addOrg('Cabang', 'newCabangName')">TAMBAH</button>
        </div>
        <div id="cabangList"></div>
    </div>

    <div id="komisariatMainView" class="view-content">
        <div id="adminKomControls" style="display:none;" class="card">
            <input type="text" id="newKomName" placeholder="Nama Komisariat">
            <button class="btn-hmi" onclick="addOrg('Komisariat', 'newKomName')">TAMBAH</button>
        </div>
        <div id="komisariatList"></div>
    </div>

    <div id="groupView" class="view-content">
        <div id="chatBoxGeneral" style="height:65vh; overflow-y:auto; background:white; padding:15px; border-radius:15px; border:1px solid #ddd; display:flex; flex-direction:column; gap:10px;"></div>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <input type="text" id="genChatInput" placeholder="Diskusi umum..." style="margin:0;">
            <button class="btn-hmi" onclick="sendGenChat()" style="width:auto; margin:0;">KIRIM</button>
        </div>
    </div>
</div>

<div id="manageModal" class="modal">
    <div class="modal-body">
        <h3 id="manageTitle">...</h3>
        <p style="font-size:12px; color:gray; text-align:left;">Ubah Jabatan Struktural</p>
        <input type="text" id="editJabatan">
        <button class="btn-hmi" id="btnSaveJabatan">SIMPAN JABATAN</button>
        
        <div id="ownerSection" style="margin-top:20px; border-top:1px solid #eee; padding-top:15px; display:none;">
            <button id="btnAdminToggle" class="btn-hmi" style="background:#007bff; margin-bottom:10px;">JADIKAN ADMIN</button>
            <button id="btnKickKader" class="btn-hmi" style="background:#ff4d4d;">KELUARKAN</button>
        </div>
        <button onclick="document.getElementById('manageModal').style.display='none'" style="background:none; border:none; margin-top:20px; color:gray; font-weight:800; cursor:pointer;">BATAL</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
    import { getFirestore, doc, onSnapshot, collection, query, orderBy, where, addDoc, setDoc, updateDoc, deleteDoc, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

    const firebaseConfig = { apiKey: "AIzaSyA_SW13O3EPp6L6TGT3UV5B2ADzwCV_Owo", authDomain: "hmi-app-ac76d.firebaseapp.com", projectId: "hmi-app-ac76d" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null, myData = null, targetKaderId = "", mediaData = "", mediaType = "";

    window.toggleSidebar = () => {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none';
    };

    window.changeView = (id, title) => {
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('pageTitle').innerText = title;
        if(window.innerWidth < 768) toggleSidebar();
        if(id === 'memberGlobalView') loadGlobalMembers();
        if(id === 'cabangView') loadOrg('Cabang', 'cabangList');
        if(id === 'komisariatMainView') loadOrg('Komisariat', 'komisariatList');
        if(id === 'adminPanel') loadPending();
        if(id === 'groupView') loadGenChat();
    };

    onAuthStateChanged(auth, (user) => {
        if(user) {
            me = user;
            document.getElementById('authLayer').style.display = 'none';
            document.getElementById('appLayer').style.display = 'block';
            onSnapshot(doc(db, "users", user.uid), (s) => {
                myData = s.data();
                document.getElementById('sideName').innerText = myData.nama;
                document.getElementById('navAva').src = document.getElementById('sideAva').src = myData.photoURL || `https://ui-avatars.com/api/?name=${myData.nama}`;
                if(myData.role === 'admin' || myData.role === 'owner') {
                    document.getElementById('adminMenu').style.display = 'block';
                    document.getElementById('adminKomControls').style.display = 'block';
                    document.getElementById('adminCabangControls').style.display = 'block';
                    const isOwner = myData.role === 'owner';
                    document.getElementById('roleBadge').innerHTML = `<span class="pos-label ${isOwner?'label-owner':'label-admin'}">${isOwner?'OWNER':'ADMIN'}</span>`;
                }
            });
            loadFeed();
        } else {
            document.getElementById('authLayer').style.display = 'flex';
            document.getElementById('appLayer').style.display = 'none';
        }
    });

    // --- MEMBER LOGIC (ALL DETECTED) ---
    async function loadGlobalMembers(search = "") {
        // Mengambil semua user tanpa filter status agar semua pendaftar terdeteksi
        const sn = await getDocs(collection(db, "users"));
        const div = document.getElementById('listGlobalMembers'); div.innerHTML = "";
        sn.forEach(u => {
            const user = u.data();
            if(search && !user.nama.toLowerCase().includes(search.toLowerCase())) return;
            const isOwner = user.role === 'owner';
            const isAdmin = user.role === 'admin';
            const showDots = (myData?.role === 'owner' && u.id !== me.uid) || (myData?.role === 'admin' && !isOwner && !isAdmin && u.id !== me.uid);

            div.innerHTML += `<div class="card">
                <div style="display:flex; align-items:center; justify-content:space-between;">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <img src="${user.photoURL || 'https://ui-avatars.com/api/?name='+user.nama}" style="width:50px; height:50px; border-radius:50%; object-fit:cover;">
                        <div>
                            <b style="font-size:16px;">${user.nama}</b><br>
                            <span class="pos-label ${isOwner?'label-owner':(isAdmin?'label-admin':'label-kader')}">${isOwner?'OWNER':(isAdmin?'ADMIN':(user.jabatan || 'Kader'))}</span>
                        </div>
                    </div>
                    ${showDots ? `<div class="action-dots" onclick="openManage('${u.id}', '${user.nama}', '${user.jabatan}', '${user.role}')">⋮</div>` : ''}
                </div>
            </div>`;
        });
    }

    window.openManage = (uid, n, j, r) => {
        targetKaderId = uid; document.getElementById('manageTitle').innerText = n;
        document.getElementById('editJabatan').value = j || "";
        document.getElementById('ownerSection').style.display = (myData?.role === 'owner') ? 'block' : 'none';
        document.getElementById('btnAdminToggle').innerText = (r === 'admin') ? 'CABUT ADMIN' : 'JADIKAN ADMIN';
        document.getElementById('manageModal').style.display = 'flex';
    };

    document.getElementById('btnSaveJabatan').onclick = async () => {
        await updateDoc(doc(db, "users", targetKaderId), { jabatan: document.getElementById('editJabatan').value });
        alert("Berhasil!"); document.getElementById('manageModal').style.display = 'none'; loadGlobalMembers();
    };

    document.getElementById('btnAdminToggle').onclick = async () => {
        const isCurrent = document.getElementById('btnAdminToggle').innerText.includes('CABUT');
        await updateDoc(doc(db, "users", targetKaderId), { role: isCurrent ? 'kader' : 'admin' });
        document.getElementById('manageModal').style.display = 'none'; loadGlobalMembers();
    };

    document.getElementById('btnKickKader').onclick = async () => {
        if(confirm("Hapus?")) { await deleteDoc(doc(db, "users", targetKaderId)); document.getElementById('manageModal').style.display = 'none'; loadGlobalMembers(); }
    };

    // --- RE-RESTORE ALL OTHER CORE FUNCTIONS ---
    function loadFeed() {
        onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), (sn) => {
            const f = document.getElementById('feed'); f.innerHTML = "";
            sn.forEach(d => {
                const p = d.data();
                f.innerHTML += `<div class="card">
                    <b>${p.name}</b><p>${p.text}</p>
                    ${p.media ? (p.type==='video'?`<video src="${p.media}" class="post-media" controls></video>`:`<img src="${p.media}" class="post-media">`) : ''}
                </div>`;
            });
        });
    }

    document.getElementById('pFile').onchange = (e) => {
        const file = e.target.files[0]; if(!file) return;
        mediaType = file.type.split('/')[0];
        const reader = new FileReader();
        reader.onload = (r) => { mediaData = r.target.result; document.getElementById('mediaPreview').style.display='block'; };
        reader.readAsDataURL(file);
    };

    document.getElementById('btnPost').onclick = async () => {
        const v = document.getElementById('pInput').value;
        if(v || mediaData) {
            await addDoc(collection(db, "posts"), { uid: me.uid, name: myData.nama, text: v, media: mediaData, type: mediaType, time: Date.now() });
            document.getElementById('pInput').value = ""; mediaData = ""; document.getElementById('mediaPreview').style.display='none';
        }
    };

    async function loadOrg(type, divId) {
        const sn = await getDocs(query(collection(db, "org_units"), where("type", "==", type)));
        const div = document.getElementById(divId); div.innerHTML = "";
        sn.forEach(d => div.innerHTML += `<div class="org-item" onclick="alert('Unit: '+d.data().name)"><b>${d.data().name}</b> <span>➡️</span></div>`);
    }

    window.addOrg = async (type, inputId) => {
        const val = document.getElementById(inputId).value;
        if(val) { await addDoc(collection(db, "org_units"), { name: val, type: type }); document.getElementById(inputId).value = ""; loadOrg(type, type==='Cabang'?'cabangList':'komisariatList'); }
    };

    window.doLogout = () => signOut(auth).then(()=>location.reload());
    document.getElementById('btnSignIn').onclick = async () => signInWithEmailAndPassword(auth, document.getElementById('logEmail').value, document.getElementById('logPass').value);
    document.getElementById('btnSignUp').onclick = async () => {
        const r = await createUserWithEmailAndPassword(auth, document.getElementById('regEmail').value, document.getElementById('regPass').value);
        await setDoc(doc(db, "users", r.user.uid), { nama: document.getElementById('regName').value, role: "kader", status: "new" });
        alert("Pendaftaran Berhasil!");
    };
    window.toggleAuth = (l) => { document.getElementById('loginBox').style.display=l?'block':'none'; document.getElementById('regBox').style.display=l?'none':'block'; };
</script>
</body>
</html>
