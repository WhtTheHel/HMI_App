<!DOCTYPE html>
<html>
<head>
<title>HMI Super App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
* {box-sizing: border-box; -webkit-tap-highlight-color: transparent;}
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0b6623 0%, #1a5f2e 50%, #111 100%);
    color: white;
    min-height: 100vh;
    padding: 10px;
    -webkit-font-smoothing: antialiased;
    touch-action: manipulation;
}

.login-container {
    max-width: 400px;
    margin: 20px auto;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 30px 25px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.25);
}

.logo {
    width: 100px;
    height: 100px;
    margin: 0 auto 20px;
    background: linear-gradient(45deg, #0b6623, #228B22);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: bold;
    box-shadow: 0 10px 30px rgba(11,102,35,0.6);
    line-height: 1;
}

.app-title {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 15px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
}

.info-section {
    background: rgba(255,255,255,0.1);
    border-radius: 15px;
    padding: 15px;
    margin: 20px 0;
    font-size: 13px;
}

input {
    width: 100%;
    padding: 15px;
    margin: 8px 0;
    border: none;
    border-radius: 12px;
    background: rgba(255,255,255,0.95);
    font-size: 16px;
    color: #333;
    -webkit-appearance: none;
}

input:focus {
    outline: none;
    background: white;
    box-shadow: 0 0 0 3px rgba(11,102,35,0.4);
}

button {
    width: 100%;
    padding: 15px;
    margin: 8px 0;
    border: none;
    border-radius: 12px;
    background: #0b6623;
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-appearance: none;
}

button:active {
    transform: scale(0.98);
    background: #1a5f2e;
}

.google-btn {background: #4285F4 !important;}

.or-divider {
    display: flex;
    align-items: center;
    margin: 20px 0;
    color: #aaa;
    font-size: 14px;
}

.or-divider::before,
.or-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.3);
}

.or-divider span {
    padding: 0 15px;
    background: rgba(255,255,255,0.15);
}

#app {display: none;}
.topbar {
    background: #0b6623;
    padding: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
}
.sidebar {
    position: fixed;
    left: -280px;
    top: 0;
    width: 280px;
    height: 100vh;
    background: #000;
    padding: 15px;
    transition: left 0.3s ease;
    overflow: auto;
    z-index: 1001;
    box-shadow: 2px 0 10px rgba(0,0,0,0.5);
}
.sidebar.active {left: 0;}
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    display: none;
}
.overlay.active {display: block;}
.card {
    background: white;
    color: black;
    margin: 15px;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
.dark .card {background: #222; color: white;}
#chatList {
    height: 400px;
    overflow-y: auto;
    margin-bottom: 15px;
    padding-right: 5px;
}
#chatList div {
    margin: 12px 0;
    padding: 15px;
    border-radius: 15px;
    background: #f5f5f5;
    word-wrap: break-word;
}
.me {
    background: #0b6623 !important;
    color: white !important;
    margin-left: 20%;
}
.preview img,.preview video {
    width: 80px;
    height: 80px;
    object-fit: cover;
    margin: 5px;
    border-radius: 8px;
}
#typingStatus {
    padding: 10px;
    color: #0b6623;
    font-style: italic;
    font-size: 14px;
}

@media (max-width: 480px) {
    body {padding: 5px;}
    .login-container {margin: 10px; padding: 25px 20px;}
    .logo {width: 80px; height: 80px; font-size: 28px;}
    .app-title {font-size: 20px;}
    #chatList {height: 300px;}
    .sidebar {width: 260px;}
    .card {margin: 10px; padding: 15px;}
}
</style>
</head>

<body>

<!-- OVERLAY -->
<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-container">
    <div class="logo">HMI</div>
    <div class="app-title">HMI SUPER APP</div>
    
    <div class="info-section">
        <h4 style="margin: 0 0 10px 0; color: #90EE90;">ℹ️ Tentang Aplikasi</h4>
        <p><strong>Pendiri:</strong> Tim Developer HMI</p>
        <p><strong>Dibuat:</strong> Desember 2024</p>
        <p><strong>Version:</strong> 1.0.1</p>
    </div>

    <input id="namaUser" placeholder="Nama Lengkap" style="display:none">
    <input id="email" placeholder="📧 Email" autocomplete="email">
    <input id="password" type="password" placeholder="🔒 Password" autocomplete="current-password">
    
    <button onclick="login()">🚀 Masuk</button>
    <button class="google-btn" onclick="loginGoogle()">🔗 Login Google</button>
    <button onclick="showRegister()">📝 Daftar Akun Baru</button>
</div>

<!-- APP SCREEN -->
<div id="app">
    <div class="topbar">
        <span onclick="toggleMenu()" style="font-size:24px;cursor:pointer;padding:5px;">☰</span>
        <b>HMI SUPER APP</b>
        <span style="font-size:20px;">💬</span>
    </div>

    <!-- SIDEBAR -->
    <div id="sidebar" class="sidebar">
        <h3 style="margin-top:0;">Menu</h3>
        <img id="profilePic" src="https://via.placeholder.com/70/0b6623/ffffff?text=👤" width="70" style="border-radius:50%;display:block;margin:10px auto">
        <p id="namaDisplay" style="font-weight:bold;text-align:center;margin:5px 0;">Loading...</p>
        <input type="file" id="editFoto" accept="image/*" style="width:100%;margin:10px 0">
        <button onclick="updateFoto()">📸 Ganti Foto</button>
        <button onclick="toggleDark()">🌙 Dark Mode</button>
        <button onclick="openGroup()">👥 Chat Grup</button>
        <button onclick="logout()">🚪 Logout</button>
    </div>

    <!-- CHAT -->
    <div class="card">
        <div id="chatList"></div>
        <div id="typingStatus"></div>
        <div style="position:relative;">
            <input id="chatInput" placeholder="Ketik pesan..." style="margin-bottom:10px">
            <input type="file" id="multiFile" multiple accept="image/*,video/*" style="display:none">
        </div>
        <div id="preview" style="display:flex;flex-wrap:wrap;"></div>
        <button onclick="sendChat()">📤 Kirim</button>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
