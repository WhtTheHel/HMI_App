<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>HMI Connect - V30 Final Fix</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --hmi-green: #084d1e; --hmi-gold: #d4af37; --bg: #f8fafc; }
        body { margin: 0; background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* UI BASE */
        .topbar { position: sticky; top: 0; background: var(--hmi-green); color: white; display: flex; justify-content: space-between; align-items: center; height: 65px; padding: 0 20px; border-bottom: 3px solid var(--hmi-gold); z-index: 1000; }
        .view-content { padding: 15px; display: none; min-height: 100vh; padding-bottom: 120px; }
        .view-content.active { display: block; }

        /* MODALS */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 20000; align-items: center; justify-content: center; padding: 20px; }
        .modal-body { background: white; padding: 25px; border-radius: 25px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; text-align: center; }

        /* CARDS */
        .card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid #edf2f7; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .avatar-img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 2px solid var(--hmi-gold); }
        .media-box { width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid #eee; }

        /* BUTTONS */
        .btn-primary { background: var(--hmi-green); color: white; border: none; padding: 14px; border-radius: 15px; font-weight: 800; width: 100%; cursor: pointer; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #ddd; outline: none; }

        /* SIDEBAR */
        #sidebar { position: fixed; left: -320px; top: 0; width: 300px; height: 100%; background: white; transition: 0.4s; z-index: 9999; padding: 25px; box-shadow: 10px 0 30px rgba(0,0,0,0.1); }
        #sidebar.active { left: 0; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9000; }
    </style>
</head>
<body>

<div id="overlay" onclick="window.toggleSidebar()"></div>

<div id="historyModal" class="modal">
    <div class="modal-body">
        <img src="pngtree-hmi-organization-shield-logo-png-image_7307707.png" width="50">
        <h2 style="color:var(--hmi-green)">Sejarah HMI</h2>
        <p style="text-align:justify; font-size:13px;">Didirikan 5 Feb 1947 oleh Lafran Pane. HMI berjuang untuk Keislaman dan Keindonesiaan. Yakin Usaha Sampai!</p>
        <button class="btn-primary" onclick="window.closeHistory()">MENGERTI</button>
    </div>
</div>

<div id="profileModal" class="modal">
    <div class="modal-body">
        <h3>Edit Profil</h3>
        <input type="file" id="upAvatar" accept="image/*" style="display:none;" onchange="window.preAvatar(this)">
        <img id="viewAvatar" src="" style="width:100px; height:100px; border-radius:50%; object-fit:cover; border:3px solid var(--hmi-gold); cursor:pointer;" onclick="document.getElementById('upAvatar').click()">
        <input type="text" id="upNama" placeholder="Nama Lengkap">
        <input type="password" id="upPass" placeholder="Password Baru">
        <button class="btn-primary" onclick="window.saveAcc()">SIMPAN</button>
        <button onclick="document.getElementById('profileModal').style.display='none'" style="border:none; background:none; color:red; font-weight:bold; margin-top:15px;">BATAL</button>
    </div>
</div>

<div id="app">
    <div class="topbar">
        <div onclick="window.toggleSidebar()" style="font-size:24px; cursor:pointer;">☰</div>
        <div style="display:flex; align-items:center; gap:8px;">
            <img src="pngtree-hmi-organization-shield-logo-png-image_7307707.png" width="30">
            <b id="viewTitle">BERANDA</b>
        </div>
        <img id="navAvatar" onclick="document.getElementById('profileModal').style.display='flex'" style="width:38px; height:38px; border-radius:50%; border:2px solid var(--hmi-gold); cursor:pointer; object-fit:cover;">
    </div>

    <div id="sidebar">
        <div style="text-align:center; padding-bottom:15px; border-bottom:1px solid #eee;">
            <img id="sideAvatar" src="" style="width:75px; height:75px; border-radius:50%; border:3px solid var(--hmi-gold); object-fit:cover; margin:10px auto; display:block;">
            <h4 id="sideName">Kader HMI</h4>
            <div id="sideBadge" style="background:var(--hmi-gold); color:white; font-size:10px; padding:3px 12px; border-radius:10px; font-weight:bold;">AKTIF</div>
        </div>
        <nav style="margin-top:20px;">
            <div style="padding:15px; cursor:pointer; font-weight:700;" onclick="window.showView('homeView', 'BERANDA')">🏠 Beranda</div>
            <div style="padding:15px; cursor:pointer; font-weight:700;" onclick="window.showView('groupView', 'GRUP DISKUSI')">👥 Grup Diskusi</div>
            <div style="padding:15px; cursor:pointer; font-weight:700; color:var(--hmi-green);" onclick="window.openHistory()">📖 Sejarah HMI</div>
            <div style="padding:15px; cursor:pointer; font-weight:700; color:red; margin-top:50px;" onclick="window.handleLogout()">🚪 Keluar</div>
        </nav>
    </div>

    <div id="homeView" class="view-content active">
        <div class="card" style="border: 2px solid var(--hmi-green);">
            <textarea id="pText" placeholder="Bagikan instruksi kader..."></textarea>
            <input type="file" id="pFile" accept="image/*,video/*" style="display:none;" onchange="window.prePost(this)">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <button onclick="document.getElementById('pFile').click()" style="background:#f1f5f9; border:none; padding:8px 15px; border-radius:10px; font-weight:bold; cursor:pointer;">🖼️ Media</button>
                <button class="btn-primary" style="width:auto; padding:10px 25px; margin:0;" onclick="window.sendPost()">POSTING</button>
            </div>
        </div>
        <div id="feed"></div>
    </div>

    <div id="groupView" class="view-content">
        <div id="chatBox" class="card" style="height:60vh; overflow-y:auto; display:flex; flex-direction:column; gap:10px;"></div>
        <div style="display:flex; gap:8px; background:white; padding:10px; border-radius:20px; border:1px solid #ddd; align-items:center;">
            <input type="file" id="cFile" accept="image/*,video/*" style="display:none;" onchange="window.preChat(this)">
            <button onclick="document.getElementById('cFile').click()" style="border:none; background:none; font-size:22px; cursor:pointer;">📎</button>
            <input type="text" id="cInput" placeholder="Ketik pesan..." style="border:none; flex:1; outline:none;">
            <button class="btn-primary" style="width:auto; padding:8px 20px; margin:0;" onclick="window.sendChat()">KIRIM</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut, updateProfile, updatePassword } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
    import { getFirestore, doc, onSnapshot, collection, query, orderBy, addDoc, deleteDoc, updateDoc, arrayUnion, arrayRemove, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

    const firebaseConfig = { apiKey: "AIzaSyA_SW13O3EPp6L6TGT3UV5B2ADzwCV_Owo", authDomain: "hmi-app-ac76d.firebaseapp.com", projectId: "hmi-app-ac76d" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let userRole = "anggota";
    let postMedia = "", chatMedia = "", tempAvatar = "";

    // --- CRITICAL BINDING ---
    window.toggleSidebar = () => {
        const active = document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').style.display = active ? 'block' : 'none';
    };

    window.handleLogout = async () => {
        if(confirm("Keluar dari aplikasi?")) {
            await signOut(auth);
            location.reload();
        }
    };

    window.showView = (id, title) => {
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('viewTitle').innerText = title;
        window.toggleSidebar();
        if(id === 'groupView') loadChat();
    };

    window.openHistory = () => { document.getElementById('historyModal').style.display = 'flex'; };
    window.closeHistory = () => { document.getElementById('historyModal').style.display = 'none'; localStorage.setItem('historyViewed', 'true'); };

    // --- AUTH & NAME SYNC ---
    onAuthStateChanged(auth, async (user) => {
        if(user) {
            if(!localStorage.getItem('historyViewed')) window.openHistory();
            
            // Ambil data real-time dari Firestore untuk memastikan nama muncul
            onSnapshot(doc(db, "users", user.uid), (s) => {
                if(s.exists()){
                    const d = s.data();
                    const name = d.nama || user.displayName || "Kader HMI";
                    const ava = d.photoURL || user.photoURL || `https://ui-avatars.com/api/?name=${name}&background=084d1e&color=fff`;
                    
                    document.getElementById('sideName').innerText = name;
                    document.getElementById('navAvatar').src = ava;
                    document.getElementById('sideAvatar').src = ava;
                    document.getElementById('viewAvatar').src = ava;
                    document.getElementById('upNama').value = name;
                }
            });
            loadFeed();
        } else {
            // Jika tidak login, bisa diarahkan ke fungsi login Anda
        }
    });

    // --- POST & INTERACTION ---
    window.prePost = (i) => { const r = new FileReader(); r.onload = () => { postMedia = r.result; alert("Media Siap!"); }; r.readAsDataURL(i.files[0]); };
    window.sendPost = async () => {
        const t = document.getElementById('pText').value;
        if(!t && !postMedia) return;
        await addDoc(collection(db, "posts"), {
            uid: auth.currentUser.uid, name: document.getElementById('sideName').innerText,
            ava: document.getElementById('sideAvatar').src, text: t, media: postMedia, likes: [], time: Date.now()
        });
        document.getElementById('pText').value = ""; postMedia = "";
    };

    window.doL = async (id, lks) => {
        const u = auth.currentUser.uid;
        await updateDoc(doc(db,"posts",id), { likes: lks.includes(u)?arrayRemove(u):arrayUnion(u) });
    };

    window.share = (n, t) => {
        const msg = `*HMI CONNECT*\nKader: ${n}\nIsi: ${t}\n\nLink: ${window.location.href}`;
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`);
    };

    window.delP = async (id) => { if(confirm("Hapus?")) await deleteDoc(doc(db, "posts", id)); };

    // --- CHAT ---
    window.preChat = (i) => { const r = new FileReader(); r.onload = () => { chatMedia = r.result; alert("Gambar siap!"); }; r.readAsDataURL(i.files[0]); };
    window.sendChat = async () => {
        const t = document.getElementById('cInput').value;
        if(!t && !chatMedia) return;
        await addDoc(collection(db, "chats"), {
            uid: auth.currentUser.uid, name: document.getElementById('sideName').innerText,
            ava: document.getElementById('sideAvatar').src, text: t, media: chatMedia, time: Date.now()
        });
        document.getElementById('cInput').value = ""; chatMedia = "";
    };

    // --- PROFILE ---
    window.preAvatar = (i) => { const r = new FileReader(); r.onload = () => { tempAvatar = r.result; document.getElementById('viewAvatar').src = r.result; }; r.readAsDataURL(i.files[0]); };
    window.saveAcc = async () => {
        const u = auth.currentUser;
        const name = document.getElementById('upNama').value;
        await updateDoc(doc(db, "users", u.uid), { nama: name, photoURL: tempAvatar || u.photoURL });
        await updateProfile(u, { displayName: name, photoURL: tempAvatar || u.photoURL });
        alert("Terupdate!"); document.getElementById('profileModal').style.display = 'none';
    };

    function loadFeed() {
        onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), (sn) => {
            const f = document.getElementById('feed'); f.innerHTML = "";
            sn.forEach(d => {
                const p = d.data(); const isL = p.likes.includes(auth.currentUser.uid);
                f.innerHTML += `<div class="card">
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                        <img src="${p.ava}" class="avatar-img">
                        <b>${p.name}</b>
                        ${(p.uid===auth.currentUser.uid) ? `<b onclick="window.delP('${d.id}')" style="margin-left:auto; color:red; cursor:pointer;">✕</b>` : ''}
                    </div>
                    <p>${p.text}</p>${p.media ? `<img src="${p.media}" class="media-box">` : ''}
                    <div style="display:flex; gap:20px; margin-top:10px; border-top:1px solid #eee; padding-top:10px;">
                        <span onclick="window.doL('${d.id}',${JSON.stringify(p.likes)})" style="cursor:pointer; font-weight:700; color:${isL?'red':'gray'}">❤️ ${p.likes.length}</span>
                        <span onclick="window.share('${p.name}','${p.text}')" style="cursor:pointer; font-weight:700; color:var(--hmi-green)">🔗 Bagikan</span>
                    </div>
                </div>`;
            });
        });
    }

    function loadChat() {
        onSnapshot(query(collection(db, "chats"), orderBy("time", "asc")), (sn) => {
            const b = document.getElementById('chatBox'); b.innerHTML = "";
            sn.forEach(d => {
                const c = d.data(); const isMe = c.uid === auth.currentUser.uid;
                b.innerHTML += `<div style="padding:10px; border-radius:15px; max-width:80%; align-self:${isMe?'flex-end':'flex-start'}; background:${isMe?'var(--hmi-green)':'#f1f5f9'}; color:${isMe?'white':'#334155'}; margin-bottom:5px;">
                    <small><b>${isMe?'Anda':c.name}</b></small><br>${c.text||''}${c.media?`<img src="${c.media}" class="media-box">`:''}
                </div>`;
            });
            b.scrollTop = b.scrollHeight;
        });
    }
</script>
</body>
</html>
